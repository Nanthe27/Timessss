<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000">
<title>Timessss</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Rubik:wght@300;400&family=Ubuntu:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --dim:rgba(255,255,255,.5);
  --dim2:rgba(255,255,255,.22);
  --border:rgba(255,255,255,.08);
  --fn:'Quicksand',sans-serif;
  --fm:'Ubuntu',sans-serif;
  --fd:'Rubik',sans-serif;
  --topH:52px;
  --botH:76px;
  --sideW:268px;
  --rightW:252px;
  --vsize:min(44vw,390px);
}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:var(--fn);-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#app{height:100%;position:relative;overflow:hidden}

/* ── BACKGROUND — cinematic slow drift ── */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bgl{
  position:absolute;inset:-100px;
  background-size:cover;background-position:center;
  filter:blur(120px) saturate(2) brightness(.36);
  will-change:transform,opacity;
  transition:opacity 2s ease;
}
.bgl.a{opacity:1;animation:drift-a 28s ease-in-out infinite}
.bgl.b{opacity:0;animation:drift-b 34s ease-in-out infinite}
@keyframes drift-a{
  0%  {transform:scale(1.08) translate(0%,0%)}
  25% {transform:scale(1.13) translate(-1.5%,1.2%)}
  50% {transform:scale(1.1)  translate(1.2%,-0.8%)}
  75% {transform:scale(1.14) translate(-0.8%,-1.4%)}
  100%{transform:scale(1.08) translate(0%,0%)}
}
@keyframes drift-b{
  0%  {transform:scale(1.1)  translate(1%,-1%)}
  33% {transform:scale(1.15) translate(-1.2%,1.5%)}
  66% {transform:scale(1.12) translate(1.8%,0.5%)}
  100%{transform:scale(1.1)  translate(1%,-1%)}
}
/* dark gradient overlay — top and bottom darker, centre open */
.bgo{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,0,0,.08) 0%, rgba(0,0,0,.55) 100%),
    linear-gradient(to bottom, rgba(0,0,0,.55) 0%, transparent 25%, transparent 75%, rgba(0,0,0,.65) 100%);
}

/* ── Veil ── */
.veil{position:fixed;inset:0;background:#000;opacity:0;z-index:300;pointer-events:none;transition:opacity .4s}
.veil.on{opacity:.72}

/* ═══════════════════ AUTH ═══════════════════ */
#auth{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  background:#000;transition:opacity .5s,transform .5s;
}
#auth.out{opacity:0;transform:scale(.96);pointer-events:none}
.av{
  width:96px;height:96px;border-radius:50%;
  background:repeating-radial-gradient(circle at 50% 50%,#1c1c1c 0px,#0d0d0d 1px,#181818 2px,#0d0d0d 3px);
  position:relative;box-shadow:0 10px 40px rgba(0,0,0,.9);
  animation:vspin 3.8s linear infinite;
}
.av::before{content:'';position:absolute;inset:28%;border-radius:50%;background:radial-gradient(#2a2a2a,#111)}
.av::after{content:'';position:absolute;inset:48%;border-radius:50%;background:radial-gradient(#bbb,#666)}
.at{font-size:28px;font-weight:700;letter-spacing:-.4px}
.as{font-family:var(--fm);font-size:13px;color:var(--dim);max-width:210px;text-align:center;line-height:1.65}
#authBtn{
  display:inline-flex;align-items:center;gap:10px;padding:13px 30px;
  border-radius:50px;border:none;background:#1DB954;color:#000;
  font-family:var(--fn);font-size:14px;font-weight:700;cursor:pointer;
  transition:transform .15s,filter .15s;
}
#authBtn:active{transform:scale(.94);filter:brightness(.9)}
#authBtn svg{width:20px;height:20px}

/* ═══════════════════ IDLE CLOCK ═══════════════════ */
#idle{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;transition:opacity .5s;
}
#idle.off{opacity:0}
.ct{display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:300;line-height:1;text-shadow:0 2px 40px rgba(0,0,0,.5)}
.ct.big .ds,.ct.big .sep{font-size:min(18vw,116px)}
.cd{font-family:var(--fm);font-size:13px;font-weight:300;color:var(--dim);margin-top:12px;letter-spacing:.5px}

/* Digit slots — no overflow:hidden */
.ds{display:inline-block;position:relative;text-align:center;height:1.1em;width:.62em}
.sep{width:.3em;text-align:center;opacity:.3}
.ds span{display:block;position:absolute;left:0;right:0;transition:transform .38s cubic-bezier(.4,0,.08,1),opacity .3s ease}
.ds span.cur{transform:translateY(0);opacity:1}
.ds span.out{transform:translateY(-100%);opacity:0}
.ds span.nxt{transform:translateY(100%);opacity:0}

/* ═══════════════════ PLAYING LAYOUT ═══════════════════ */
#play{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .5s;
}
#play.on{opacity:1;pointer-events:auto}

/* TOP BAR */
#top{
  height:var(--topH);
  padding:0 18px;padding-top:var(--safe-t);
  display:flex;align-items:center;gap:14px;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:20;position:relative;
}
.tbrand{font-size:15px;font-weight:700;letter-spacing:-.2px;color:rgba(255,255,255,.9);flex-shrink:0}
.tclk{
  flex:1;text-align:center;
  font-family:var(--fd);font-size:18px;font-weight:300;
  letter-spacing:1px;color:rgba(255,255,255,.82);
}
.tact{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tbt{
  background:rgba(255,255,255,.07);border:1px solid var(--border);
  color:rgba(255,255,255,.55);cursor:pointer;
  border-radius:50px;padding:0 14px;height:30px;
  display:flex;align-items:center;
  font-family:var(--fm);font-size:11px;
  transition:background .18s;flex-shrink:0;
}
.tbt:active{background:rgba(255,255,255,.14)}

/* MAIN 3-PANEL */
#main{
  flex:1;min-height:0;
  display:grid;
  grid-template-columns:var(--sideW) 1fr var(--rightW);
}

/* ── LEFT SIDEBAR ── */
#side{
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sideh{
  padding:16px 18px 12px;
  font-size:9px;font-weight:700;letter-spacing:1.8px;color:var(--dim2);
  text-transform:uppercase;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
#tracks{
  flex:1;overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;
}
#tracks::-webkit-scrollbar{width:3px}
#tracks::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.ti{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;cursor:default;
  transition:background .15s;
  border-bottom:1px solid rgba(255,255,255,.025);
  position:relative;
}
.ti:hover{background:rgba(255,255,255,.04)}
.ti.active{background:rgba(255,255,255,.06)}
.ti.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:#c0392b;border-radius:0 2px 2px 0}
.tinum{font-family:var(--fd);font-size:10px;color:var(--dim2);min-width:18px;text-align:right;flex-shrink:0}
.ti.active .tinum{display:none}
.tibars{display:none;align-items:flex-end;gap:1.5px;height:13px;min-width:18px;flex-shrink:0}
.ti.active .tibars{display:flex}
.tib{width:2.5px;background:#c0392b;border-radius:1px;animation:tiba .55s ease-in-out infinite alternate}
.tib:nth-child(1){height:5px;animation-delay:0s}
.tib:nth-child(2){height:9px;animation-delay:.18s}
.tib:nth-child(3){height:6px;animation-delay:.36s}
#app:not(.playing) .tib{animation-play-state:paused}
@keyframes tiba{from{transform:scaleY(.3)}to{transform:scaleY(1)}}
.tiart{width:34px;height:34px;border-radius:5px;overflow:hidden;flex-shrink:0;background:#1a1a1a}
.tiart img{width:100%;height:100%;object-fit:cover;display:block}
.tiinfo{flex:1;min-width:0}
.titl{font-size:11.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tiar{font-size:10px;font-family:var(--fm);color:var(--dim);margin-top:1.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tidur{font-size:9.5px;font-family:var(--fd);color:var(--dim2);flex-shrink:0;margin-left:2px}

/* ── CENTER VINYL ── */
#vcenter{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;gap:18px;
}
#vwrap{position:relative;width:var(--vsize);height:var(--vsize);flex-shrink:0}

#vrec{
  width:100%;height:100%;border-radius:50%;
  position:relative;
  animation:vspin 3.6s linear infinite;
  animation-play-state:paused;
  will-change:transform;
  filter:drop-shadow(0 28px 70px rgba(0,0,0,.95));
}
#app.playing #vrec{animation-play-state:running}
.vdisc{
  position:absolute;inset:0;border-radius:50%;
  background:repeating-radial-gradient(circle at 50% 50%,#101010 0px,#090909 1px,#151515 2px,#090909 3px,#111 5px);
}
.vdisc::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(
    rgba(255,255,255,.03) 0deg,transparent 50deg,
    rgba(255,255,255,.02) 110deg,transparent 160deg,
    rgba(255,255,255,.025) 220deg,transparent 270deg,
    rgba(255,255,255,.03) 320deg,transparent 360deg
  );
}
.vlabel{
  position:absolute;width:33%;height:33%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  border-radius:50%;overflow:hidden;background:#1e1e1e;z-index:2;
}
.vlabel img{width:100%;height:100%;object-fit:cover;display:block}
.vpin{
  position:absolute;width:9px;height:9px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  border-radius:50%;background:radial-gradient(circle,#ccc,#555);z-index:3;
}
.tawrap{position:absolute;top:2%;right:2%;width:50%;height:56%;pointer-events:none;z-index:4}
.tapivot{
  position:absolute;top:6%;right:6%;width:14px;height:14px;
  border-radius:50%;background:radial-gradient(circle,#999,#444);
  box-shadow:0 2px 8px rgba(0,0,0,.6);
}
.taarm{
  position:absolute;top:calc(6% + 7px);right:calc(6% + 7px);
  width:2.5px;height:78%;
  background:linear-gradient(to bottom,#888,#555);
  border-radius:2px;transform-origin:top center;transform:rotate(-30deg);
}
.taarm::after{
  content:'';position:absolute;bottom:-2px;left:50%;
  transform:translateX(-50%) rotate(14deg);
  width:10px;height:2.5px;background:#666;border-radius:2px;
}
.tahead{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:#aaa}

/* Vinyl info shown below vinyl (portrait / vertical screens) */
#vinfo{display:none;flex-direction:column;align-items:center;text-align:center;gap:4px;padding:0 20px}
.vi-title{font-size:18px;font-weight:700;letter-spacing:-.2px}
.vi-artist{font-size:13px;font-family:var(--fm);color:var(--dim)}

@keyframes vspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── RIGHT PANEL ── */
#rpanel{
  background:rgba(0,0,0,.48);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.rart{flex-shrink:0;aspect-ratio:1/1;width:100%;overflow:hidden;position:relative}
.rart img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .5s}
.rart::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 55%,rgba(0,0,0,.88) 100%)}
.rinfo{flex:1;padding:16px 18px;display:flex;flex-direction:column;gap:5px;border-top:1px solid var(--border)}
.rlabel{font-size:9px;font-weight:700;letter-spacing:1.6px;color:var(--dim2);text-transform:uppercase;margin-bottom:2px}
.rtitle{font-size:15px;font-weight:700;line-height:1.3}
.rartist{font-size:12px;font-family:var(--fm);color:var(--dim);margin-top:1px}
.ralbum{font-size:10.5px;font-family:var(--fm);color:var(--dim2);margin-top:3px}

/* ── BOTTOM BAR ── */
#bot{
  height:var(--botH);padding-bottom:var(--safe-b);
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;z-index:20;position:relative;
}
.bleft{display:flex;align-items:center;gap:10px;width:var(--sideW);flex-shrink:0;min-width:0}
.bart{width:42px;height:42px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#1a1a1a}
.bart img{width:100%;height:100%;object-fit:cover;display:block}
.binfo{flex:1;min-width:0}
.btitle{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bartist{font-size:10px;font-family:var(--fm);color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.bcenter{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.bbtns{display:flex;align-items:center;gap:8px}
.cbtn{
  background:none;border:none;color:#fff;cursor:pointer;
  border-radius:50%;padding:10px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,opacity .15s;
}
.cbtn:active{transform:scale(.85);opacity:.6}
.cbtn.sm svg{width:24px;height:24px}
.cbtn.lg svg{width:30px;height:30px}

/* progress shown as time only */

.bright{width:var(--rightW);flex-shrink:0;display:flex;justify-content:flex-end;align-items:center}
.btime{font-family:var(--fd);font-size:10.5px;color:rgba(255,255,255,.22);letter-spacing:.3px}

/* ══════════════════════════════════════════
   VERTICAL / PORTRAIT LAYOUT
   (portrait monitors, vertical TVs, phones held upright)
══════════════════════════════════════════ */
@media (orientation:portrait),(max-aspect-ratio:3/4){
  :root{
    --vsize:min(72vw,440px);
    --topH:54px;
    --botH:auto;
    --sideW:0px;
    --rightW:0px;
  }
  /* Hide side panels */
  #side,#rpanel{display:none}

  /* Show track info below vinyl */
  #vinfo{display:flex}

  /* Stack main vertically */
  #main{
    grid-template-columns:1fr;
    grid-template-rows:1fr;
  }
  #vcenter{
    padding:24px 16px 16px;
    gap:22px;
    justify-content:center;
  }

  /* Bottom bar: two rows */
  #bot{
    flex-direction:column;
    padding:14px 20px calc(14px + var(--safe-b));
    height:auto;gap:10px;
  }
  /* Row 1: art + track info */
  .bleft{width:100%;flex-shrink:0}
  /* Row 2: waveform + controls + time all in center */
  .bcenter{width:100%}
  .bright{width:100%;justify-content:center;margin-top:-4px}
  .btime{font-size:11px}

  /* Top bar clock bigger */
  .tclk{font-size:16px}
}

/* Extra-tall portrait (big vertical TV) */
@media (orientation:portrait) and (min-height:1000px){
  :root{--vsize:min(65vw,600px)}
  .vi-title{font-size:24px}
  .vi-artist{font-size:15px}
  .ct.big .ds,.ct.big .sep{font-size:min(16vw,130px)}
}

/* Landscape small height (horizontal phone/tablet) */
@media (orientation:landscape) and (max-height:500px){
  :root{--vsize:min(42vh,240px);--topH:44px;--botH:62px}
}

/* Wide desktop — hide panels if not enough room */
@media (max-width:860px) and (orientation:landscape){
  :root{--sideW:0px;--rightW:0px;--vsize:min(56vh,360px)}
  #side,#rpanel{display:none}
  #vinfo{display:flex}
  .bleft{width:auto}
  .bright{width:auto}
}
</style>
</head>
<body>
<div id="app">

  <!-- Background -->
  <div class="bg">
    <div class="bgl a" id="bgA"></div>
    <div class="bgl b" id="bgB"></div>
    <div class="bgo"></div>
  </div>
  <div class="veil" id="veil"></div>

  <!-- Auth -->
  <div id="auth">
    <div class="av"></div>
    <div class="at">Timessss</div>
    <div class="as">Connect Spotify to bring your music to life</div>
    <button id="authBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381C8.64 5.801 15.6 6.06 20.04 8.82c.541.3.719 1.02.42 1.56-.299.421-1.02.599-1.379.3z"/></svg>
      Connect Spotify
    </button>
  </div>

  <!-- Idle: big clock -->
  <div id="idle">
    <div class="ct big" id="ct">
      <div class="ds" id="h0"><span class="cur">0</span></div>
      <div class="ds" id="h1"><span class="cur">0</span></div>
      <div class="sep">:</div>
      <div class="ds" id="m0"><span class="cur">0</span></div>
      <div class="ds" id="m1"><span class="cur">0</span></div>
      <div class="sep">:</div>
      <div class="ds" id="s0"><span class="cur">0</span></div>
      <div class="ds" id="s1"><span class="cur">0</span></div>
    </div>
    <div class="cd" id="cd"></div>
  </div>

  <!-- Playing layout -->
  <div id="play">

    <div id="top">
      <div class="tbrand">Timessss</div>
      <div class="tclk" id="tclk">--:--:--</div>
      <div class="tact">
        <button class="tbt" id="discBtn">Disconnect</button>
      </div>
    </div>

    <div id="main">

      <!-- Left -->
      <div id="side">
        <div class="sideh">Queue</div>
        <div id="tracks"></div>
      </div>

      <!-- Center: vinyl + info (portrait) -->
      <div id="vcenter">
        <div id="vwrap">
          <div id="vrec">
            <div class="vdisc"></div>
            <div class="vlabel"><img id="vart" src="" alt=""></div>
            <div class="vpin"></div>
          </div>
        </div>
        <!-- Only visible in portrait/vertical -->
        <div id="vinfo">
          <div class="vi-title" id="vi-title">--</div>
          <div class="vi-artist" id="vi-artist">--</div>
        </div>
      </div>

      <!-- Right -->
      <div id="rpanel">
        <div class="rart"><img id="rimg" src="" alt=""></div>
        <div class="rinfo">
          <div class="rlabel">Now Playing</div>
          <div class="rtitle" id="rtitle">--</div>
          <div class="rartist" id="rartist">--</div>
          <div class="ralbum" id="ralbum"></div>
        </div>
      </div>

    </div>

    <!-- Bottom bar -->
    <div id="bot">
      <div class="bcenter">
        <div class="bbtns">
          <button class="cbtn sm" id="bPrev"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
          <button class="cbtn lg" id="bPlay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
          <button class="cbtn sm" id="bNext"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>
        <div class="btime" id="btime">0:00 / 0:00</div>
      </div>
      <div class="bright"></div>
    </div>

  </div>
</div>

<script>
/* ═══ CONFIG — redirect auto-detects current origin ═══ */
const REDIRECT = location.href.split('?')[0].replace(/index\.html$/, '');
const C = {
  id: '2dba0d8b0d3540c79971f906ab1e3589',
  redirect: REDIRECT,
  scope: 'user-read-playback-state user-modify-playback-state user-read-recently-played user-read-currently-playing',
  TK:'ts_tk', RT:'ts_rt', EX:'ts_ex', CV:'ts_cv',
};

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML };
const sleep = ms => new Promise(r => setTimeout(r, ms));
const fmt = ms => { const s = Math.floor(ms/1000), m = Math.floor(s/60); return `${m}:${(s%60).toString().padStart(2,'0')}` };

/* ═══ AUTH ═══ */
function rnd(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return Array.from(a,b=>b.toString(16).padStart(2,'0')).join('')}
async function sha(s){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s))}
function b64u(b){return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
async function doAuth(){
  const v=rnd(64); localStorage.setItem(C.CV,v);
  location.href='https://accounts.spotify.com/authorize?'+new URLSearchParams({
    client_id:C.id, response_type:'code', redirect_uri:C.redirect,
    scope:C.scope, code_challenge_method:'S256', code_challenge:b64u(await sha(v))
  });
}
async function swap(code){
  const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({client_id:C.id,grant_type:'authorization_code',
      code, redirect_uri:C.redirect, code_verifier:localStorage.getItem(C.CV)})});
  const d=await r.json(); if(d.access_token){save(d);return true} return false;
}
async function doRefresh(){
  const rt=localStorage.getItem(C.RT); if(!rt)return false;
  try{
    const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({client_id:C.id,grant_type:'refresh_token',refresh_token:rt})});
    const d=await r.json(); if(d.access_token){save(d);return true}
  }catch(e){}
  return false;
}
function save(d){
  localStorage.setItem(C.TK,d.access_token);
  if(d.refresh_token)localStorage.setItem(C.RT,d.refresh_token);
  localStorage.setItem(C.EX,Date.now()+d.expires_in*1000);
}
const token=()=>localStorage.getItem(C.TK);
const expired=()=>Date.now()>+(localStorage.getItem(C.EX)||0);
function clearAuth(){[C.TK,C.RT,C.EX,C.CV].forEach(k=>localStorage.removeItem(k))}
async function api(path){
  if(expired()&&!await doRefresh()){goAuth();return null}
  try{
    const r=await fetch('https://api.spotify.com/v1'+path,{headers:{Authorization:'Bearer '+token()}});
    if(r.status===401){if(!await doRefresh()){goAuth();return null}return api(path)}
    if(r.status===204||r.status===202)return null;
    return r.json();
  }catch(e){return null}
}
async function cmd(method,path){
  if(expired())await doRefresh();
  return fetch('https://api.spotify.com/v1'+path,{method,headers:{Authorization:'Bearer '+token()}});
}

/* ═══ STATE ═══ */
let S={playing:false,tid:null,prog:0,dur:0,title:'',artist:'',album:'',art:'',bgSide:'a',pollT:0,pollP:0};

/* ═══ CLOCK ═══ */
const SLOTS=['h0','h1','m0','m1','s0','s1'];
function setDigit(id,val){
  const el=$('#'+id);
  // Remove any stale out/nxt spans left over from backgrounded tab
  el.querySelectorAll('.out,.nxt').forEach(s=>s.remove());
  const cur=el.querySelector('.cur');
  if(cur&&cur.textContent===val)return;
  const n=document.createElement('span');
  n.textContent=val; n.className='nxt';
  el.appendChild(n);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    if(cur)cur.className='out';
    n.className='cur';
  }));
  if(cur)setTimeout(()=>{if(cur.parentNode)cur.remove()},500);
}

// When tab regains focus, force-clean all digit slots instantly
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){
    SLOTS.forEach(id=>{
      const el=$('#'+id);
      const all=[...el.querySelectorAll('span')];
      if(all.length>1){
        all.slice(0,-1).forEach(s=>s.remove());
        all[all.length-1].className='cur';
      }
    });
    tick();
  }
});
function tick(){
  const now=new Date();
  const h=now.getHours().toString().padStart(2,'0');
  const m=now.getMinutes().toString().padStart(2,'0');
  const s=now.getSeconds().toString().padStart(2,'0');
  [h[0],h[1],m[0],m[1],s[0],s[1]].forEach((v,i)=>setDigit(SLOTS[i],v));
  $('#cd').textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  $('#tclk').textContent=`${h}:${m}:${s}`;
}
setInterval(tick,1000); tick();

/* ═══ BG ═══ */
function setBg(url){
  if(!url)return;
  const nx=S.bgSide==='a'?'b':'a';
  const nE=$('#bg'+nx.toUpperCase()), cE=$('#bg'+S.bgSide.toUpperCase());
  nE.style.backgroundImage=`url(${url})`;
  requestAnimationFrame(()=>{nE.style.opacity='1';cE.style.opacity='0'});
  S.bgSide=nx;
}

/* ═══ PROGRESS TIME ═══ */
function updateWaveform(){
  $('#btime').textContent=`${fmt(S.prog)} / ${fmt(S.dur)}`;
}

/* ═══ TRACK LIST ═══ */
function renderTracks(list){
  const el=$('#tracks'); el.innerHTML='';
  list.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='ti'+(t.cur?' active':'');
    d.innerHTML=`
      <div class="tibars"><div class="tib"></div><div class="tib"></div><div class="tib"></div></div>
      <div class="tinum">${String(i+1).padStart(2,'0')}</div>
      <div class="tiart"><img src="${t.art||''}" loading="lazy" alt=""></div>
      <div class="tiinfo">
        <div class="titl">${esc(t.name)}</div>
        <div class="tiar">${esc(t.artist)}</div>
      </div>
      ${t.dur?`<div class="tidur">${fmt(t.dur)}</div>`:''}
    `;
    el.appendChild(d);
    if(t.cur)requestAnimationFrame(()=>d.scrollIntoView({block:'center',behavior:'smooth'}));
  });
}

/* ═══ RENDER ═══ */
function render(){
  const a=S.art||'';
  $('#vart').src=a;
  $('#rimg').src=a;
  $('#rtitle').textContent=S.title||'--';
  $('#rartist').textContent=S.artist||'--';
  $('#ralbum').textContent=S.album||'';
  $('#vi-title').textContent=S.title||'--';
  $('#vi-artist').textContent=S.artist||'--';
  playIcon();
}
function playIcon(){
  $('#bPlay').innerHTML=S.playing
    ?'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>'
    :'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  $('#app').classList.toggle('playing',S.playing);
}

/* ═══ PROGRESS ═══ */
let pRAF=null;
function startProg(){
  const f=()=>{
    if(S.playing){S.prog=Math.min(S.pollP+(Date.now()-S.pollT),S.dur)}
    updateWaveform(); pRAF=requestAnimationFrame(f);
  };
  if(!pRAF)f();
}
function stopProg(){if(pRAF){cancelAnimationFrame(pRAF);pRAF=null}}

/* ═══ TRANSITION ═══ */
async function transition(d){
  const vl=$('#veil'); vl.classList.add('on'); await sleep(340);
  S.tid=d.id; S.title=d.title; S.artist=d.artist; S.album=d.album;
  S.art=d.art; S.prog=d.prog; S.dur=d.dur; S.playing=d.playing;
  S.pollT=Date.now(); S.pollP=d.prog;
  setBg(S.art);
  const [q,rc]=await Promise.all([api('/me/player/queue'),api('/me/player/recently-played?limit=5')]);
  const cur={name:S.title,artist:S.artist,art:S.art,dur:S.dur,cur:true};
  const seen=new Set([S.art]);
  const dedup=arr=>arr.filter(c=>{if(!c.art||seen.has(c.art))return false;seen.add(c.art);return true});
  const right=dedup((q?.queue||[]).slice(0,5).map(t=>({
    name:t.name,artist:(t.artists||[]).map(a=>a.name).join(', '),
    art:t.album?.images?.[1]?.url||t.album?.images?.[0]?.url||'',
    dur:t.duration_ms||0,cur:false
  })));
  const left=dedup((rc?.items||[]).slice(0,3).reverse().map(it=>({
    name:it.track.name,artist:(it.track.artists||[]).map(a=>a.name).join(', '),
    art:it.track.album?.images?.[1]?.url||it.track.album?.images?.[0]?.url||'',
    dur:it.track.duration_ms||0,cur:false
  })));
  renderTracks([...left,cur,...right]);
  render();
  await sleep(160); vl.classList.remove('on');
}

/* ═══ POLL ═══ */
let pollId=null;
async function poll(){
  const d=await api('/me/player/currently-playing');
  if(d?.item){
    const isNew=d.item.id!==S.tid;
    S.playing=d.is_playing; S.pollT=Date.now(); S.pollP=d.progress_ms||0;
    if(isNew){
      await transition({
        id:d.item.id, title:d.item.name,
        artist:(d.item.artists||[]).map(a=>a.name).join(', '),
        album:d.item.album?.name||'',
        art:d.item.album?.images?.[0]?.url||'',
        prog:d.progress_ms||0, dur:d.item.duration_ms||0, playing:d.is_playing
      });
      goPlay();
    } else {
      S.prog=d.progress_ms||0; S.dur=d.item.duration_ms||0;
      playIcon();
    }
    startProg();
  } else {
    S.playing=false; S.tid=null;
    $('#app').classList.remove('playing');
    goIdle(); stopProg();
  }
}

/* ═══ MODES ═══ */
function goPlay(){$('#idle').classList.add('off');$('#play').classList.add('on')}
function goIdle(){
  $('#idle').classList.remove('off');$('#play').classList.remove('on');
  $('#bgA').style.opacity='0';$('#bgB').style.opacity='0';
}

/* ═══ CONTROLS ═══ */
$('#bPlay').onclick=async()=>{
  if(S.playing){await cmd('PUT','/me/player/pause');S.playing=false}
  else{await cmd('PUT','/me/player/play');S.playing=true}
  S.pollT=Date.now();S.pollP=S.prog;playIcon();
};
$('#bNext').onclick=async()=>{await cmd('POST','/me/player/next');setTimeout(poll,500)};
$('#bPrev').onclick=async()=>{await cmd('POST','/me/player/previous');setTimeout(poll,500)};
$('#discBtn').onclick=()=>{clearAuth();goAuth()};

/* ═══ AUTH FLOW ═══ */
function goAuth(){if(pollId)clearInterval(pollId);stopProg();$('#auth').classList.remove('out');goIdle()}
function goMain(){$('#auth').classList.add('out');poll();pollId=setInterval(poll,3500)}
$('#authBtn').onclick=doAuth;

/* ═══ INIT ═══ */
(async()=>{
  const p=new URLSearchParams(location.search), code=p.get('code');
  if(code){history.replaceState(null,'',location.pathname);if(await swap(code)){goMain();return}}
  const t=token();
  if(t&&!expired()){goMain();return}
  if(t&&expired()&&await doRefresh()){goMain();return}
  goAuth();
})();

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
