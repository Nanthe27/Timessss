<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Timessss</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23000'/%3E%3Ccircle cx='50' cy='50' r='34' fill='none' stroke='%23fff' stroke-width='2.5'/%3E%3Cline x1='50' y1='50' x2='50' y2='22' stroke='%23fff' stroke-width='3' stroke-linecap='round'/%3E%3Cline x1='50' y1='50' x2='63' y2='56' stroke='%23fff' stroke-width='2.5' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='50' r='2.5' fill='%23fff'/%3E%3C/svg%3E">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Rubik:wght@300;400;500;700&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --text:#fff;--text2:rgba(255,255,255,.55);
  --font-ui:'Quicksand',sans-serif;
  --font-label:'Ubuntu',sans-serif;
  --font-num:'Rubik',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --hide-speed:.5s;
}
html,body{height:100%;overflow:hidden;background:#000;color:var(--text);font-family:var(--font-ui);-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
#app{height:100%;width:100%;position:relative;overflow:hidden}

/* ── BG ── */
.bg{position:fixed;inset:0;z-index:0}
.bg-layer{position:absolute;inset:-60px;background-size:cover;background-position:center;filter:blur(90px) saturate(1.5) brightness(.65);transition:opacity 1.4s ease;will-change:opacity}
.bg-layer.a{opacity:1}.bg-layer.b{opacity:0}
.bg-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3)}
.bg-beat{position:absolute;inset:-60px;background:radial-gradient(ellipse at center,rgba(255,255,255,.06) 0%,transparent 70%);opacity:0;will-change:opacity;pointer-events:none}

/* ── Veil ── */
.veil{position:fixed;inset:0;background:#000;opacity:0;z-index:50;pointer-events:none;transition:opacity .45s ease}
.veil.on{opacity:.65}

/* ── Auth ── */
#auth{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:#000;transition:opacity .6s,transform .6s}
#auth.out{opacity:0;transform:scale(.95);pointer-events:none}
.auth-logo{width:44px;height:44px;opacity:.65}
.auth-title{font-size:26px;font-weight:600;letter-spacing:-.5px}
.auth-sub{font-family:var(--font-label);font-size:13px;color:var(--text2);max-width:240px;text-align:center;line-height:1.5}
.auth-btn{display:inline-flex;align-items:center;gap:10px;padding:13px 30px;border-radius:50px;border:none;background:#fff;color:#000;font-family:var(--font-ui);font-size:14px;font-weight:600;cursor:pointer;transition:transform .2s}
.auth-btn:active{transform:scale(.95)}
.auth-btn svg{width:20px;height:20px}

/* ── Clock ── */
.clock{
  position:fixed;top:calc(16px + var(--safe-top));left:0;right:0;
  display:flex;flex-direction:column;align-items:center;z-index:10;
  pointer-events:none;transition:opacity .5s ease,transform .5s ease;
}
.clock.off{opacity:0;transform:translateY(-16px)}
.clock.hero{top:50%;transform:translateY(-50%)}
.clock.hero.off{opacity:0;transform:translateY(calc(-50% - 16px))}

.clock-time{
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-num);font-weight:300;line-height:1;
  text-shadow:0 2px 24px rgba(0,0,0,.6);
}
.clock-date{font-family:var(--font-label);font-size:min(3.2vw,13px);font-weight:300;color:var(--text2);margin-top:6px;letter-spacing:.4px;text-shadow:0 1px 10px rgba(0,0,0,.5)}

/* Digit slots */
.d-slot{
  display:inline-block;position:relative;overflow:hidden;text-align:center;
  height:1.1em;
}
/* Fixed width: all digits same column width */
.d-slot{width:.62em}
.d-sep{width:.35em;text-align:center;opacity:.5}
.d-slot span{
  display:block;position:absolute;left:0;right:0;
  transition:transform .45s cubic-bezier(.4,0,.08,1),opacity .45s ease;
}
.d-slot span.cur{transform:translateY(0);opacity:1}
.d-slot span.out{transform:translateY(-120%);opacity:0}
.d-slot span.wait{transform:translateY(120%);opacity:0}

/* Size variations */
.clock-time.big .d-slot,.clock-time.big .d-sep{font-size:min(18vw,110px)}
.clock-time.sm .d-slot,.clock-time.sm .d-sep{font-size:min(12vw,60px)}

/* ── Card Fan ── */
.fan{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:5;opacity:1;transition:opacity .5s}
.fan.off{opacity:0;pointer-events:none}
.fan-card{
  position:absolute;
  width:min(40vw,190px);aspect-ratio:3/4;
  border-radius:14px;overflow:hidden;background:#111;
  box-shadow:0 10px 40px rgba(0,0,0,.55);
  transition:transform .65s cubic-bezier(.4,0,.12,1),opacity .45s ease;
  will-change:transform,opacity;
}
.fan-card img{width:100%;height:100%;object-fit:cover;display:block}
.fan-card-info{position:absolute;bottom:0;left:0;right:0;padding:24px 10px 10px;background:linear-gradient(transparent,rgba(0,0,0,.82))}
.fan-card-title{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fan-card-artist{font-size:9px;font-family:var(--font-label);color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fan-card.p-2{transform:rotate(-15deg) translateX(-125%) scale(.7);opacity:.45;z-index:1}
.fan-card.p-1{transform:rotate(-7deg) translateX(-60%) scale(.85);opacity:.75;z-index:2}
.fan-card.p0{transform:rotate(0) translateX(0) scale(1);opacity:1;z-index:3}
.fan-card.p1{transform:rotate(7deg) translateX(60%) scale(.85);opacity:.75;z-index:2}
.fan-card.p2{transform:rotate(15deg) translateX(125%) scale(.7);opacity:.45;z-index:1}
.fan-card.gone-l{transform:rotate(-20deg) translateX(-200%) scale(.5);opacity:0}
.fan-card.gone-r{transform:rotate(20deg) translateX(200%) scale(.5);opacity:0}

/* ── Floating Controls ── */
.ctrl-wrap{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  z-index:20;display:flex;flex-direction:column;align-items:center;gap:10px;
  transition:opacity var(--hide-speed) ease,transform var(--hide-speed) ease;
}
.ctrl-wrap.off{opacity:0;transform:translate(-50%,-50%) scale(.95);pointer-events:none}
.ctrl-wrap.gone{display:none}

.ctrl-card{
  background:rgba(18,18,18,.65);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);
  border:1px solid rgba(255,255,255,.07);border-radius:20px;
  padding:14px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;
  min-width:220px;
}
.ctrl-track{display:flex;align-items:center;gap:10px;width:100%}
.ctrl-art{width:44px;height:44px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#222}
.ctrl-art img{width:100%;height:100%;object-fit:cover;display:block}
.ctrl-info{flex:1;min-width:0}
.ctrl-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctrl-artist{font-size:11px;font-family:var(--font-label);color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctrl-btns{display:flex;align-items:center;gap:8px}
.c-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:6px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.c-btn:active{transform:scale(.85)}
.c-btn.sm svg{width:22px;height:22px}
.c-btn.lg svg{width:32px;height:32px}
.ctrl-prog{width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.ctrl-prog-fill{height:100%;background:var(--text);width:0;transition:width .35s linear}

/* ── Top Buttons (auto-hide) ── */
.ui-fade{transition:opacity var(--hide-speed) ease;pointer-events:auto}
.ui-fade.dim{opacity:0;pointer-events:none}
.top-btn{position:fixed;top:calc(10px + var(--safe-top));z-index:15;background:rgba(255,255,255,.08);border:none;color:var(--text2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);cursor:pointer;border-radius:50%}
.top-btn svg{display:block}
#clockToggle{right:12px;width:30px;height:30px;padding:7px}
#beatToggle{right:48px;width:30px;height:30px;padding:7px}
#discBtn{left:12px;border-radius:14px;padding:6px 11px;font-family:var(--font-label);font-size:10px;width:auto;height:auto}

.beat-off #beatToggle{opacity:.3}

/* ── Responsive ── */
@media (max-width:380px){
  .fan-card{width:min(36vw,150px)}
  .clock-time.big .d-slot,.clock-time.big .d-sep{font-size:min(15vw,80px)}
  .clock-time.sm .d-slot,.clock-time.sm .d-sep{font-size:10vw}
}
@media (orientation:landscape) and (max-height:500px){
  .fan-card{width:min(20vh,150px)}
  .clock-time.sm .d-slot,.clock-time.sm .d-sep{font-size:min(10vh,48px)}
  .clock-time.big .d-slot,.clock-time.big .d-sep{font-size:min(16vh,80px)}
}
@media (min-width:768px){.fan-card{width:min(22vw,210px)}}
</style>
</head>
<body>
<div id="app">
  <div class="bg"><div class="bg-layer a" id="bgA"></div><div class="bg-layer b" id="bgB"></div><div class="bg-overlay"></div><div class="bg-beat" id="bgBeat"></div></div>
  <div class="veil" id="veil"></div>

  <!-- Auth -->
  <div id="auth">
    <svg class="auth-logo" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="34" stroke="#fff" stroke-width="2.5"/><line x1="50" y1="50" x2="50" y2="22" stroke="#fff" stroke-width="3" stroke-linecap="round"/><line x1="50" y1="50" x2="63" y2="56" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><circle cx="50" cy="50" r="2.5" fill="#fff"/></svg>
    <div class="auth-title">Timessss</div>
    <div class="auth-sub">Connect Spotify to bring your music to life</div>
    <button class="auth-btn" id="authBtn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.6 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381C8.64 5.801 15.6 6.06 20.04 8.82c.541.3.719 1.02.42 1.56-.299.421-1.02.599-1.379.3z"/></svg>Connect Spotify</button>
  </div>

  <!-- Clock -->
  <div class="clock hero" id="clock">
    <div class="clock-time big" id="clockTime">
      <div class="d-slot" id="h0"><span class="cur">0</span></div>
      <div class="d-slot" id="h1"><span class="cur">0</span></div>
      <div class="d-sep">:</div>
      <div class="d-slot" id="m0"><span class="cur">0</span></div>
      <div class="d-slot" id="m1"><span class="cur">0</span></div>
      <div class="d-sep">:</div>
      <div class="d-slot" id="s0"><span class="cur">0</span></div>
      <div class="d-slot" id="s1"><span class="cur">0</span></div>
    </div>
    <div class="clock-date" id="clockDate"></div>
  </div>

  <!-- Top buttons -->
  <button class="top-btn ui-fade" id="clockToggle" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg></button>
  <button class="top-btn ui-fade" id="beatToggle" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></button>
  <button class="top-btn ui-fade" id="discBtn" style="display:none">Disconnect</button>

  <!-- Fan -->
  <div class="fan off" id="fan"></div>

  <!-- Floating Controls -->
  <div class="ctrl-wrap gone" id="ctrl">
    <div class="ctrl-card">
      <div class="ctrl-track">
        <div class="ctrl-art"><img id="cArt" src="" alt=""></div>
        <div class="ctrl-info"><div class="ctrl-title" id="cTitle">--</div><div class="ctrl-artist" id="cArtist">--</div></div>
      </div>
      <div class="ctrl-prog"><div class="ctrl-prog-fill" id="prog"></div></div>
      <div class="ctrl-btns">
        <button class="c-btn sm" id="bPrev"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button class="c-btn lg" id="bPlay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="c-btn sm" id="bNext"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══ CONFIG ═══ */
const C={
  clientId:'2dba0d8b0d3540c79971f906ab1e3589',
  redirect:'https://nanthe27.github.io/Timessss/',
  scopes:'user-read-playback-state user-modify-playback-state user-read-recently-played user-read-currently-playing',
  tk:'ts_tk',rt:'ts_rt',ex:'ts_ex',cv:'ts_cv',
};
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const esc=s=>{const d=document.createElement('span');d.textContent=s;return d.innerHTML};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* ═══ AUTH ═══ */
function rnd(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return Array.from(a,b=>b.toString(16).padStart(2,'0')).join('')}
async function sha(s){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s))}
function b64u(b){return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
async function doAuth(){const v=rnd(64);localStorage.setItem(C.cv,v);location.href='https://accounts.spotify.com/authorize?'+new URLSearchParams({client_id:C.clientId,response_type:'code',redirect_uri:C.redirect,scope:C.scopes,code_challenge_method:'S256',code_challenge:b64u(await sha(v))})}
async function swap(code){const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({client_id:C.clientId,grant_type:'authorization_code',code,redirect_uri:C.redirect,code_verifier:localStorage.getItem(C.cv)})});const d=await r.json();if(d.access_token){sv(d);return true}return false}
async function refresh(){const rt=localStorage.getItem(C.rt);if(!rt)return false;try{const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({client_id:C.clientId,grant_type:'refresh_token',refresh_token:rt})});const d=await r.json();if(d.access_token){sv(d);return true}}catch(e){}return false}
function sv(d){localStorage.setItem(C.tk,d.access_token);if(d.refresh_token)localStorage.setItem(C.rt,d.refresh_token);localStorage.setItem(C.ex,Date.now()+d.expires_in*1000)}
function tk(){return localStorage.getItem(C.tk)}
function exp(){return Date.now()>+(localStorage.getItem(C.ex)||0)}
function clr(){[C.tk,C.rt,C.ex,C.cv].forEach(k=>localStorage.removeItem(k))}
async function api(p){if(exp()&&!await refresh()){goAuth();return null}try{const r=await fetch('https://api.spotify.com/v1'+p,{headers:{Authorization:'Bearer '+tk()}});if(r.status===401){if(!await refresh()){goAuth();return null};return api(p)}if(r.status===204||r.status===202)return null;return r.json()}catch(e){return null}}
async function cmd(m,p){if(exp())await refresh();return fetch('https://api.spotify.com/v1'+p,{method:m,headers:{Authorization:'Bearer '+tk()}})}

/* ═══ STATE ═══ */
let S={playing:false,tid:null,prog:0,dur:0,title:'',artist:'',art:'',bpm:0,clockOn:true,beatOn:true,bgSide:'a',pollT:0,pollP:0,mode:'idle',digits:['0','0','0','0','0','0']};

/* ═══ CLOCK DIGITS ═══ */
const slots=['h0','h1','m0','m1','s0','s1'];

function setDigit(slotId,val){
  const el=$('#'+slotId);
  const cur=el.querySelector('.cur');
  if(cur&&cur.textContent===val)return; // no change
  // Create new digit
  const next=document.createElement('span');
  next.textContent=val;
  next.className='wait';
  el.appendChild(next);
  // Animate
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    if(cur)cur.className='out';
    next.className='cur';
  }));
  // Cleanup old
  if(cur)setTimeout(()=>{if(cur.parentNode)cur.remove()},500);
}

function tick(){
  const n=new Date();
  const h=n.getHours().toString().padStart(2,'0');
  const m=n.getMinutes().toString().padStart(2,'0');
  const s=n.getSeconds().toString().padStart(2,'0');
  const vals=[h[0],h[1],m[0],m[1],s[0],s[1]];
  vals.forEach((v,i)=>setDigit(slots[i],v));
  $('#clockDate').textContent=n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
setInterval(tick,1000);tick();

/* ═══ AUTO-HIDE UI ═══ */
let hideTimer=null;
function showUI(){
  $$('.ui-fade').forEach(e=>e.classList.remove('dim'));
  const ctrl=$('#ctrl');
  if(S.mode==='playing'&&!ctrl.classList.contains('gone'))ctrl.classList.remove('off');
  clearTimeout(hideTimer);
  hideTimer=setTimeout(hideUI,3000);
}
function hideUI(){
  $$('.ui-fade').forEach(e=>e.classList.add('dim'));
  const ctrl=$('#ctrl');
  if(!ctrl.classList.contains('gone'))ctrl.classList.add('off');
}
// Listen for any interaction
['mousemove','touchstart','click','keydown'].forEach(ev=>{
  document.addEventListener(ev,showUI,{passive:true});
});

/* ═══ CLOCK TOGGLE ═══ */
$('#clockToggle').onclick=()=>{S.clockOn=!S.clockOn;$('#clock').classList.toggle('off',!S.clockOn);showUI()};

/* ═══ BEAT TOGGLE ═══ */
$('#beatToggle').onclick=()=>{
  S.beatOn=!S.beatOn;
  document.body.classList.toggle('beat-off',!S.beatOn);
  if(!S.beatOn)stopBeat();
  else if(S.playing&&S.bpm)startBeat(S.bpm);
  showUI();
};

/* ═══ BACKGROUND ═══ */
function setBg(url){
  if(!url)return;
  const nxt=S.bgSide==='a'?'b':'a';
  const nE=$('#bg'+nxt.toUpperCase()),cE=$('#bg'+S.bgSide.toUpperCase());
  nE.style.backgroundImage=`url(${url})`;
  requestAnimationFrame(()=>{nE.style.opacity='1';cE.style.opacity='0'});
  S.bgSide=nxt;
}

/* ═══ BEAT SYNC ═══ */
let beatId=null;
function startBeat(bpm){
  stopBeat();if(!S.beatOn)return;if(!bpm||bpm<40)bpm=120;S.bpm=bpm;
  const ms=60000/bpm,el=$('#bgBeat');
  function frame(now){
    if(!S.playing||!S.beatOn){el.style.opacity='0';beatId=requestAnimationFrame(frame);return}
    const v=Math.max(0,Math.sin(((now%ms)/ms)*Math.PI*2))*.85;
    el.style.opacity=v;
    beatId=requestAnimationFrame(frame);
  }
  beatId=requestAnimationFrame(frame);
}
function stopBeat(){if(beatId){cancelAnimationFrame(beatId);beatId=null;$('#bgBeat').style.opacity='0'}}
async function getBpm(id){const d=await api('/audio-features/'+id);return d?.tempo||0}

/* ═══ FAN ═══ */
function renderFan(cards){
  const el=$('#fan');el.innerHTML='';
  const ci=cards.findIndex(c=>c.cur);if(ci<0)return;
  cards.forEach((c,i)=>{
    const p=i-ci;if(p<-2||p>2)return;
    const d=document.createElement('div');
    d.className='fan-card gone-'+(p<=0?'l':'r');
    d.innerHTML=`<img src="${c.art}" alt=""><div class="fan-card-info"><div class="fan-card-title">${esc(c.name)}</div><div class="fan-card-artist">${esc(c.artist)}</div></div>`;
    el.appendChild(d);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{d.className='fan-card p'+p}));
  });
}

/* ═══ CONTROLS ═══ */
function renderCtrl(){
  $('#cArt').src=S.art||'';
  $('#cTitle').textContent=S.title||'--';
  $('#cArtist').textContent=S.artist||'--';
  playIcon();
}
function playIcon(){
  $('#bPlay').innerHTML=S.playing
    ?'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>'
    :'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
}

/* ═══ PROGRESS ═══ */
let progRAF=null;
function startProg(){
  function f(){
    if(S.playing){const e=Date.now()-S.pollT;S.prog=Math.min(S.pollP+e,S.dur)}
    $('#prog').style.width=(S.dur?S.prog/S.dur*100:0)+'%';
    progRAF=requestAnimationFrame(f);
  }
  if(!progRAF)f();
}
function stopProg(){if(progRAF){cancelAnimationFrame(progRAF);progRAF=null}}

/* ═══ TRACK TRANSITION ═══ */
async function transition(d){
  const v=$('#veil');
  v.classList.add('on');await sleep(380);
  S.tid=d.id;S.title=d.title;S.artist=d.artist;S.art=d.art;S.prog=d.prog;S.dur=d.dur;S.playing=d.playing;
  S.pollT=Date.now();S.pollP=d.prog;
  setBg(S.art);
  const [q,rc]=await Promise.all([api('/me/player/queue'),api('/me/player/recently-played?limit=5')]);
  const cur={name:S.title,artist:S.artist,art:S.art,cur:true};
  const seen=new Set([S.art]);
  const dedup=arr=>arr.filter(c=>{if(!c.art||seen.has(c.art))return false;seen.add(c.art);return true});
  const right=dedup((q?.queue||[]).slice(0,2).map(t=>({name:t.name,artist:(t.artists||[]).map(a=>a.name).join(', '),art:t.album?.images?.[0]?.url||'',cur:false})));
  const left=dedup((rc?.items||[]).slice(0,2).reverse().map(it=>({name:it.track.name,artist:(it.track.artists||[]).map(a=>a.name).join(', '),art:it.track.album?.images?.[0]?.url||'',cur:false})));
  renderFan([...left,cur,...right]);
  renderCtrl();
  const bpm=await getBpm(S.tid);
  startBeat(bpm);
  await sleep(180);v.classList.remove('on');
}

/* ═══ POLL ═══ */
let pollId=null;
async function poll(){
  const d=await api('/me/player/currently-playing');
  if(d?.item){
    const isNew=d.item.id!==S.tid;
    S.playing=d.is_playing;S.pollT=Date.now();S.pollP=d.progress_ms||0;
    if(isNew){
      await transition({id:d.item.id,title:d.item.name,artist:(d.item.artists||[]).map(a=>a.name).join(', '),art:d.item.album?.images?.[0]?.url||'',prog:d.progress_ms||0,dur:d.item.duration_ms||0,playing:d.is_playing});
      goPlaying();
    }else{
      S.prog=d.progress_ms||0;S.dur=d.item.duration_ms||0;playIcon();
      if(!S.playing)stopBeat();else if(!beatId&&S.bpm&&S.beatOn)startBeat(S.bpm);
    }
    startProg();
  }else{
    S.playing=false;S.tid=null;goIdle();stopBeat();stopProg();
  }
}

/* ═══ MODES ═══ */
function goPlaying(){
  S.mode='playing';
  $('#fan').classList.remove('off');
  $('#ctrl').classList.remove('gone');
  $('#clock').classList.remove('hero');
  $('#clockTime').classList.remove('big');$('#clockTime').classList.add('sm');
  $('#clockToggle').style.display='';$('#beatToggle').style.display='';$('#discBtn').style.display='';
  showUI(); // start auto-hide timer
}
function goIdle(){
  S.mode='idle';
  $('#fan').classList.add('off');
  $('#ctrl').classList.add('gone');$('#ctrl').classList.add('off');
  $('#clock').classList.add('hero');$('#clock').classList.remove('off');
  $('#clockTime').classList.add('big');$('#clockTime').classList.remove('sm');
  S.clockOn=true;
  $('#clockToggle').style.display='none';$('#beatToggle').style.display='none';$('#discBtn').style.display='none';
  $('#bgA').style.opacity='0';$('#bgB').style.opacity='0';
}

/* ═══ CONTROL EVENTS ═══ */
$('#bPlay').onclick=async()=>{
  if(S.playing){await cmd('PUT','/me/player/pause');S.playing=false;stopBeat()}
  else{await cmd('PUT','/me/player/play');S.playing=true;if(S.bpm&&S.beatOn)startBeat(S.bpm)}
  S.pollT=Date.now();S.pollP=S.prog;playIcon();showUI();
};
$('#bNext').onclick=async()=>{await cmd('POST','/me/player/next');setTimeout(poll,500);showUI()};
$('#bPrev').onclick=async()=>{await cmd('POST','/me/player/previous');setTimeout(poll,500);showUI()};
$('#discBtn').onclick=()=>{clr();goAuth()};

/* ═══ AUTH FLOW ═══ */
function goAuth(){if(pollId)clearInterval(pollId);stopBeat();stopProg();$('#auth').classList.remove('out');goIdle()}
function goMain(){$('#auth').classList.add('out');poll();pollId=setInterval(poll,3500)}
$('#authBtn').onclick=doAuth;

/* ═══ INIT ═══ */
(async()=>{
  const p=new URLSearchParams(location.search),code=p.get('code');
  if(code){history.replaceState(null,'',location.pathname);if(await swap(code)){goMain();return}}
  const t=tk();
  if(t&&!exp()){goMain();return}
  if(t&&exp()&&await refresh()){goMain();return}
  goAuth();
})();

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
