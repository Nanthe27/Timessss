<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23000'/%3E%3Ccircle cx='50' cy='50' r='34' fill='none' stroke='%23fff' stroke-width='2.5'/%3E%3Cline x1='50' y1='50' x2='50' y2='22' stroke='%23fff' stroke-width='3' stroke-linecap='round'/%3E%3Cline x1='50' y1='50' x2='63' y2='56' stroke='%23fff' stroke-width='2.5' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='50' r='2.5' fill='%23fff'/%3E%3C/svg%3E">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000;--surface:#0a0a0a;--card:#111;--text:#fff;--text2:#888;--accent:#1db954;
  --font-ui:'Quicksand',sans-serif;
  --font-label:'Ubuntu',sans-serif;
  --font-num:'GT America','Outfit','DM Sans','Ubuntu',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-ui);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#app{height:100%;width:100%;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ── BG Gradient ── */
.bg-glow{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity 1.2s ease}
.bg-glow.active{opacity:1}
.bg-glow-inner{width:100%;height:100%;filter:blur(120px) saturate(1.4);opacity:.25}

/* ── Auth Screen ── */
#auth-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;z-index:10;transition:opacity .6s,transform .6s}
#auth-screen.hidden{opacity:0;transform:scale(.96);pointer-events:none}
.auth-logo{width:48px;height:48px;opacity:.7}
.auth-title{font-family:var(--font-ui);font-size:28px;font-weight:600;letter-spacing:-.5px}
.auth-sub{font-family:var(--font-label);font-size:14px;color:var(--text2);max-width:260px;text-align:center;line-height:1.5}
.auth-btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 32px;border-radius:50px;border:none;
  background:#fff;color:#000;font-family:var(--font-ui);font-size:15px;font-weight:600;
  cursor:pointer;transition:transform .2s,box-shadow .2s;
}
.auth-btn:active{transform:scale(.96)}
.auth-btn svg{width:20px;height:20px}

/* ── Main View ── */
#main-view{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;opacity:0;transform:translateY(20px);transition:opacity .8s ease,transform .8s ease;pointer-events:none;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
#main-view.active{opacity:1;transform:translateY(0);pointer-events:auto}

/* ── Clock ── */
.clock-wrap{display:flex;flex-direction:column;align-items:center;transition:all .8s cubic-bezier(.4,0,.2,1);z-index:2;position:relative}
.clock-wrap.hero{flex:1;justify-content:center}
.clock-wrap.compact{padding-top:16px;flex:0}
.clock-time{font-family:var(--font-num);font-weight:300;letter-spacing:-2px;line-height:1;transition:font-size .8s cubic-bezier(.4,0,.2,1)}
.clock-time.hero{font-size:min(28vw,140px)}
.clock-time.compact{font-size:min(14vw,64px)}
.clock-date{font-family:var(--font-label);font-weight:300;color:var(--text2);margin-top:8px;transition:font-size .6s;letter-spacing:.5px}
.clock-date.hero{font-size:min(4vw,18px)}
.clock-date.compact{font-size:12px}
.clock-seconds{font-family:var(--font-num);font-weight:300;color:var(--text2);transition:font-size .6s,opacity .6s}
.clock-seconds.hero{font-size:min(6vw,28px);opacity:.5;margin-top:4px}
.clock-seconds.compact{font-size:0;opacity:0;height:0;margin:0}

/* ── Card Fan ── */
.card-fan-wrap{position:relative;width:100%;display:flex;justify-content:center;align-items:center;transition:all .8s cubic-bezier(.4,0,.2,1);overflow:visible}
.card-fan-wrap.hidden{height:0;opacity:0;pointer-events:none}
.card-fan-wrap.visible{height:min(52vw,280px);opacity:1;margin:12px 0}
.card-fan{position:relative;width:min(42vw,200px);height:min(42vw,200px)}
.fan-card{
  position:absolute;width:min(38vw,180px);height:min(38vw,180px);
  border-radius:16px;overflow:hidden;
  background:var(--card);
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  transition:transform .7s cubic-bezier(.4,0,.2,1),opacity .5s;
  transform-origin:center bottom;
  left:50%;top:50%;
}
.fan-card img{width:100%;height:100%;object-fit:cover}
.fan-card:nth-child(1){transform:translate(-50%,-50%) rotate(-18deg) translateX(-40%);z-index:1}
.fan-card:nth-child(2){transform:translate(-50%,-50%) rotate(-8deg) translateX(-15%);z-index:2}
.fan-card:nth-child(3){transform:translate(-50%,-50%) rotate(0deg);z-index:3}
.fan-card:nth-child(4){transform:translate(-50%,-50%) rotate(8deg) translateX(15%);z-index:4}
.fan-card:nth-child(5){transform:translate(-50%,-50%) rotate(18deg) translateX(40%);z-index:5}

/* ── Now Playing ── */
.np-wrap{
  width:calc(100% - 40px);max-width:400px;
  transition:all .8s cubic-bezier(.4,0,.2,1);overflow:hidden;z-index:3;
}
.np-wrap.hidden{max-height:0;opacity:0;margin:0;pointer-events:none}
.np-wrap.visible{max-height:400px;opacity:1;margin-bottom:20px}
.np-card{
  background:rgba(255,255,255,.06);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border-radius:20px;padding:16px;
  display:flex;gap:14px;align-items:center;
  border:1px solid rgba(255,255,255,.08);
}
.np-art{width:72px;height:72px;border-radius:12px;overflow:hidden;flex-shrink:0;background:var(--card)}
.np-art img{width:100%;height:100%;object-fit:cover}
.np-info{flex:1;min-width:0}
.np-title{font-family:var(--font-ui);font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-artist{font-family:var(--font-label);font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-progress{width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:10px;overflow:hidden}
.np-progress-bar{height:100%;background:var(--text);border-radius:2px;transition:width .5s linear}
.np-controls{display:flex;align-items:center;gap:4px;margin-top:8px}
.np-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:6px;border-radius:50%;transition:opacity .2s,transform .15s}
.np-btn:active{transform:scale(.88)}
.np-btn:hover{opacity:.8}
.np-btn svg{width:20px;height:20px;display:block}
.np-btn.play-btn svg{width:28px;height:28px}
.np-time-row{display:flex;justify-content:space-between;font-family:var(--font-num);font-size:10px;color:var(--text2);margin-top:4px}

/* ── Disconnect ── */
.disconnect-btn{
  position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;z-index:20;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  color:var(--text2);font-family:var(--font-label);font-size:11px;
  padding:8px 14px;border-radius:20px;cursor:pointer;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transition:opacity .3s;
}
.disconnect-btn:hover{color:var(--text)}

/* ── Landscape tweaks ── */
@media (orientation:landscape) and (max-height:500px){
  #main-view{flex-direction:row;padding:8px 20px}
  .clock-wrap.compact{padding-top:0;justify-content:center;flex:1}
  .clock-wrap.hero{flex:1}
  .card-fan-wrap.visible{height:min(40vh,200px);margin:0 8px}
  .fan-card{width:min(30vh,140px);height:min(30vh,140px)}
  .card-fan{width:min(30vh,140px);height:min(30vh,140px)}
  .np-wrap{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);width:calc(100% - 40px)}
}

/* ── Small phones ── */
@media (max-width:360px){
  .clock-time.hero{font-size:24vw}
  .clock-time.compact{font-size:12vw}
  .fan-card{width:32vw;height:32vw}
  .card-fan{width:32vw;height:32vw}
  .card-fan-wrap.visible{height:44vw}
}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.anim-fade{animation:fadeUp .6s ease both}
.pulse{animation:pulse 1.6s ease infinite}
</style>
</head>
<body>
<div id="app">
  <!-- BG Glow (dynamic from album art) -->
  <div class="bg-glow" id="bgGlow"><div class="bg-glow-inner" id="bgGlowInner"></div></div>

  <!-- Auth -->
  <div id="auth-screen">
    <svg class="auth-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="34" stroke="#fff" stroke-width="2.5"/>
      <line x1="50" y1="50" x2="50" y2="22" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="63" y2="56" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="50" cy="50" r="2.5" fill="#fff"/>
    </svg>
    <div class="auth-title">Timessss</div>
    <div class="auth-sub">Connect your Spotify to bring your music into your clock</div>
    <button class="auth-btn" id="authBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.6 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381C8.64 5.801 15.6 6.06 20.04 8.82c.541.3.719 1.02.42 1.56-.299.421-1.02.599-1.379.3z"/></svg>
      Enter Store
    </button>
  </div>

  <!-- Main View -->
  <div id="main-view">
    <div class="clock-wrap hero" id="clockWrap">
      <div class="clock-time hero" id="clockTime">00:00</div>
      <div class="clock-seconds hero" id="clockSec">00</div>
      <div class="clock-date hero" id="clockDate"></div>
    </div>
    <div class="card-fan-wrap hidden" id="cardFanWrap">
      <div class="card-fan" id="cardFan"></div>
    </div>
    <div class="np-wrap hidden" id="npWrap">
      <div class="np-card">
        <div class="np-art"><img id="npArt" src="" alt=""></div>
        <div class="np-info">
          <div class="np-title" id="npTitle">--</div>
          <div class="np-artist" id="npArtist">--</div>
          <div class="np-progress"><div class="np-progress-bar" id="npBar"></div></div>
          <div class="np-time-row"><span id="npElapsed">0:00</span><span id="npDuration">0:00</span></div>
          <div class="np-controls">
            <button class="np-btn" id="btnPrev"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button class="np-btn play-btn" id="btnPlay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
            <button class="np-btn" id="btnNext"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
          </div>
        </div>
      </div>
    </div>
    <button class="disconnect-btn" id="disconnectBtn">Disconnect</button>
  </div>
</div>

<script>
const C={
  clientId:'2dba0d8b0d3540c79971f906ab1e3589',
  redirect:'https://nanthe27.github.io/TimesssBynan/',
  scopes:'user-read-playback-state user-modify-playback-state user-read-recently-played user-read-currently-playing',
  tokenKey:'timessss_token',
  refreshKey:'timessss_refresh',
  expiryKey:'timessss_expiry',
  codeVerifierKey:'timessss_cv',
};

// ── Helpers ──
const $=s=>document.querySelector(s);
const fmt=ms=>{const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);return m+':'+(s<10?'0':'')+s};

// ── PKCE ──
function genRandom(len){const a=new Uint8Array(len);crypto.getRandomValues(a);return Array.from(a,b=>b.toString(16).padStart(2,'0')).join('')}
async function sha256(plain){const enc=new TextEncoder().encode(plain);const hash=await crypto.subtle.digest('SHA-256',enc);return hash}
function base64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}

async function startAuth(){
  const verifier=genRandom(64);
  localStorage.setItem(C.codeVerifierKey,verifier);
  const challenge=base64url(await sha256(verifier));
  const params=new URLSearchParams({
    client_id:C.clientId,
    response_type:'code',
    redirect_uri:C.redirect,
    scope:C.scopes,
    code_challenge_method:'S256',
    code_challenge:challenge,
  });
  location.href='https://accounts.spotify.com/authorize?'+params;
}

async function exchangeCode(code){
  const verifier=localStorage.getItem(C.codeVerifierKey);
  const res=await fetch('https://accounts.spotify.com/api/token',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({
      client_id:C.clientId,
      grant_type:'authorization_code',
      code,
      redirect_uri:C.redirect,
      code_verifier:verifier,
    }),
  });
  const d=await res.json();
  if(d.access_token){
    saveTokens(d);
    return true;
  }
  return false;
}

async function refreshToken(){
  const rt=localStorage.getItem(C.refreshKey);
  if(!rt)return false;
  try{
    const res=await fetch('https://accounts.spotify.com/api/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({
        client_id:C.clientId,
        grant_type:'refresh_token',
        refresh_token:rt,
      }),
    });
    const d=await res.json();
    if(d.access_token){saveTokens(d);return true}
  }catch(e){}
  return false;
}

function saveTokens(d){
  localStorage.setItem(C.tokenKey,d.access_token);
  if(d.refresh_token)localStorage.setItem(C.refreshKey,d.refresh_token);
  localStorage.setItem(C.expiryKey,Date.now()+d.expires_in*1000);
}

function getToken(){return localStorage.getItem(C.tokenKey)}
function isExpired(){return Date.now()>parseInt(localStorage.getItem(C.expiryKey)||'0')}
function clearTokens(){[C.tokenKey,C.refreshKey,C.expiryKey,C.codeVerifierKey].forEach(k=>localStorage.removeItem(k))}

async function api(path){
  if(isExpired()){const ok=await refreshToken();if(!ok){showAuth();return null}}
  try{
    const res=await fetch('https://api.spotify.com/v1'+path,{headers:{Authorization:'Bearer '+getToken()}});
    if(res.status===401){const ok=await refreshToken();if(!ok){showAuth();return null};return api(path)}
    if(res.status===204)return null;
    return res.json();
  }catch(e){return null}
}

async function apiPut(path){
  if(isExpired())await refreshToken();
  return fetch('https://api.spotify.com/v1'+path,{method:'PUT',headers:{Authorization:'Bearer '+getToken()}});
}
async function apiPost(path){
  if(isExpired())await refreshToken();
  return fetch('https://api.spotify.com/v1'+path,{method:'POST',headers:{Authorization:'Bearer '+getToken()}});
}

// ── State ──
let S={
  playing:false,
  trackId:null,
  progress:0,
  duration:0,
  albumArt:'',
  title:'',
  artist:'',
  recentArts:[],
  dominantColor:null,
};

// ── Clock ──
function tickClock(){
  const now=new Date();
  const h=now.getHours().toString().padStart(2,'0');
  const m=now.getMinutes().toString().padStart(2,'0');
  const s=now.getSeconds().toString().padStart(2,'0');
  $('#clockTime').textContent=h+':'+m;
  $('#clockSec').textContent=s;
  const opts={weekday:'long',month:'long',day:'numeric'};
  $('#clockDate').textContent=now.toLocaleDateString('en-US',opts);
}
setInterval(tickClock,1000);
tickClock();

// ── UI Transitions ──
function setMode(mode){
  const cw=$('#clockWrap'),ct=$('#clockTime'),cd=$('#clockDate'),cs=$('#clockSec');
  const fan=$('#cardFanWrap'),np=$('#npWrap');
  if(mode==='hero'){
    cw.className='clock-wrap hero';
    ct.className='clock-time hero';
    cd.className='clock-date hero';
    cs.className='clock-seconds hero';
    fan.className='card-fan-wrap hidden';
    np.className='np-wrap hidden';
  }else{
    cw.className='clock-wrap compact';
    ct.className='clock-time compact';
    cd.className='clock-date compact';
    cs.className='clock-seconds compact';
    fan.className='card-fan-wrap visible';
    np.className='np-wrap visible';
  }
}

// ── Card Fan ──
function renderFan(){
  const fan=$('#cardFan');
  fan.innerHTML='';
  const arts=S.recentArts.slice(0,5);
  arts.forEach((url,i)=>{
    const div=document.createElement('div');
    div.className='fan-card';
    div.style.animationDelay=i*80+'ms';
    const img=document.createElement('img');
    img.src=url;
    img.loading='lazy';
    div.appendChild(img);
    fan.appendChild(div);
  });
}

// ── Now Playing ──
function renderNP(){
  $('#npArt').src=S.albumArt||'';
  $('#npTitle').textContent=S.title||'--';
  $('#npArtist').textContent=S.artist||'--';
  $('#npBar').style.width=(S.duration?S.progress/S.duration*100:0)+'%';
  $('#npElapsed').textContent=fmt(S.progress);
  $('#npDuration').textContent=fmt(S.duration);
  updatePlayIcon();
}

function updatePlayIcon(){
  const svg=S.playing
    ?'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>'
    :'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  $('#btnPlay').innerHTML=svg;
}

// ── BG Glow from album art ──
function updateGlow(imgUrl){
  if(!imgUrl){$('#bgGlow').classList.remove('active');return}
  const el=$('#bgGlowInner');
  el.style.background=`url(${imgUrl}) center/cover no-repeat`;
  $('#bgGlow').classList.add('active');
}

// ── Spotify Polling ──
let pollTimer=null;
let progressTimer=null;

async function pollPlayback(){
  const d=await api('/me/player/currently-playing');
  if(d&&d.item){
    const newTrack=d.item.id!==S.trackId;
    S.trackId=d.item.id;
    S.playing=d.is_playing;
    S.progress=d.progress_ms||0;
    S.duration=d.item.duration_ms||0;
    S.title=d.item.name;
    S.artist=(d.item.artists||[]).map(a=>a.name).join(', ');
    const imgs=d.item.album?.images||[];
    S.albumArt=imgs[0]?.url||'';

    if(newTrack){
      updateGlow(S.albumArt);
      await fetchRecent();
    }

    setMode('playing');
    renderNP();
    startProgressTick();
  }else{
    S.playing=false;S.trackId=null;
    setMode('hero');
    updateGlow(null);
    stopProgressTick();
  }
}

function startProgressTick(){
  stopProgressTick();
  if(!S.playing)return;
  progressTimer=setInterval(()=>{
    if(!S.playing)return;
    S.progress=Math.min(S.progress+500,S.duration);
    $('#npBar').style.width=(S.duration?S.progress/S.duration*100:0)+'%';
    $('#npElapsed').textContent=fmt(S.progress);
  },500);
}
function stopProgressTick(){if(progressTimer){clearInterval(progressTimer);progressTimer=null}}

async function fetchRecent(){
  const d=await api('/me/player/recently-played?limit=10');
  if(d&&d.items){
    const seen=new Set();
    const arts=[];
    // Current album art first if available
    if(S.albumArt){arts.push(S.albumArt);seen.add(S.albumArt)}
    d.items.forEach(it=>{
      const url=it.track?.album?.images?.[0]?.url;
      if(url&&!seen.has(url)&&arts.length<5){arts.push(url);seen.add(url)}
    });
    S.recentArts=arts;
    renderFan();
  }
}

// ── Controls ──
$('#btnPlay').addEventListener('click',async()=>{
  if(S.playing){await apiPut('/me/player/pause');S.playing=false;stopProgressTick()}
  else{await apiPut('/me/player/play');S.playing=true;startProgressTick()}
  updatePlayIcon();
});
$('#btnNext').addEventListener('click',async()=>{await apiPost('/me/player/next');setTimeout(pollPlayback,400)});
$('#btnPrev').addEventListener('click',async()=>{await apiPost('/me/player/previous');setTimeout(pollPlayback,400)});
$('#disconnectBtn').addEventListener('click',()=>{clearTokens();showAuth()});

// ── Auth Flow ──
function showAuth(){
  clearInterval(pollTimer);stopProgressTick();
  $('#auth-screen').classList.remove('hidden');
  $('#main-view').classList.remove('active');
}
function showMain(){
  $('#auth-screen').classList.add('hidden');
  $('#main-view').classList.add('active');
  pollPlayback();
  pollTimer=setInterval(pollPlayback,3000);
}

$('#authBtn').addEventListener('click',startAuth);

// ── Init ──
async function init(){
  // Handle callback
  const params=new URLSearchParams(location.search);
  const code=params.get('code');
  if(code){
    history.replaceState(null,'',location.pathname);
    const ok=await exchangeCode(code);
    if(ok){showMain();return}
  }
  // Check existing token
  const t=getToken();
  if(t&&!isExpired()){showMain();return}
  if(t&&isExpired()){
    const ok=await refreshToken();
    if(ok){showMain();return}
  }
  showAuth();
}

init();

// ── PWA SW ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
