<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000">
<title>Timessss</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Rubik:wght@300;400&family=Ubuntu:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --dim:rgba(255,255,255,.5);
  --dim2:rgba(255,255,255,.22);
  --border:rgba(255,255,255,.08);
  --fn:'Quicksand',sans-serif;
  --fm:'Ubuntu',sans-serif;
  --fd:'Rubik',sans-serif;
  --topH:52px;
  --botH:76px;
  --sideW:268px;
  --rightW:252px;
  --vsize:min(44vw,390px);
}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:var(--fn);-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#app{height:100%;position:relative;overflow:hidden}

/* ── BACKGROUND — cinematic slow drift ── */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bgl{
  position:absolute;inset:-100px;
  background-size:cover;background-position:center;
  filter:blur(120px) saturate(2) brightness(.36);
  will-change:transform,opacity;
  transition:opacity 2s ease;
}
.bgl.a{opacity:1;animation:drift-a 28s ease-in-out infinite}
.bgl.b{opacity:0;animation:drift-b 34s ease-in-out infinite}
@keyframes drift-a{
  0%  {transform:scale(1.08) translate(0%,0%)}
  25% {transform:scale(1.13) translate(-1.5%,1.2%)}
  50% {transform:scale(1.1)  translate(1.2%,-0.8%)}
  75% {transform:scale(1.14) translate(-0.8%,-1.4%)}
  100%{transform:scale(1.08) translate(0%,0%)}
}
@keyframes drift-b{
  0%  {transform:scale(1.1)  translate(1%,-1%)}
  33% {transform:scale(1.15) translate(-1.2%,1.5%)}
  66% {transform:scale(1.12) translate(1.8%,0.5%)}
  100%{transform:scale(1.1)  translate(1%,-1%)}
}
/* dark gradient overlay — top and bottom darker, centre open */
.bgo{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,0,0,.08) 0%, rgba(0,0,0,.55) 100%),
    linear-gradient(to bottom, rgba(0,0,0,.55) 0%, transparent 25%, transparent 75%, rgba(0,0,0,.65) 100%);
}

/* ── Veil ── */
.veil{position:fixed;inset:0;background:#000;opacity:0;z-index:300;pointer-events:none;transition:opacity .4s}
.veil.on{opacity:.72}

/* ═══════════════════ AUTH ═══════════════════ */
#auth{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  background:#000;transition:opacity .5s,transform .5s;
}
#auth.out{opacity:0;transform:scale(.96);pointer-events:none}
.av{
  width:96px;height:96px;border-radius:50%;
  background:repeating-radial-gradient(circle at 50% 50%,#1c1c1c 0px,#0d0d0d 1px,#181818 2px,#0d0d0d 3px);
  position:relative;box-shadow:0 10px 40px rgba(0,0,0,.9);
  animation:vspin 3.8s linear infinite;
}
.av::before{content:'';position:absolute;inset:28%;border-radius:50%;background:radial-gradient(#2a2a2a,#111)}
.av::after{content:'';position:absolute;inset:48%;border-radius:50%;background:radial-gradient(#bbb,#666)}
.at{font-size:28px;font-weight:700;letter-spacing:-.4px}
.as{font-family:var(--fm);font-size:13px;color:var(--dim);max-width:210px;text-align:center;line-height:1.65}
#authBtn{
  display:inline-flex;align-items:center;gap:10px;padding:13px 30px;
  border-radius:50px;border:none;background:#1DB954;color:#000;
  font-family:var(--fn);font-size:14px;font-weight:700;cursor:pointer;
  transition:transform .15s,filter .15s;
}
#authBtn:active{transform:scale(.94);filter:brightness(.9)}
#authBtn svg{width:20px;height:20px}

/* ═══════════════════ IDLE CLOCK ═══════════════════ */
#idle{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;transition:opacity .5s;
}
#idle.off{opacity:0}
.ct{display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:300;line-height:1;text-shadow:0 2px 40px rgba(0,0,0,.5)}
.ct.big .ds,.ct.big .sep{font-size:min(18vw,116px)}
.cd{font-family:var(--fm);font-size:13px;font-weight:300;color:var(--dim);margin-top:12px;letter-spacing:.5px}

/* Digit slots — no overflow:hidden */
.ds{display:inline-block;position:relative;text-align:center;height:1.1em;width:.62em}
.sep{width:.3em;text-align:center;opacity:.3}
.ds span{display:block;position:absolute;left:0;right:0;transition:transform .38s cubic-bezier(.4,0,.08,1),opacity .3s ease}
.ds span.cur{transform:translateY(0);opacity:1}
.ds span.out{transform:translateY(-100%);opacity:0}
.ds span.nxt{transform:translateY(100%);opacity:0}

/* ═══════════════════ PLAYING LAYOUT ═══════════════════ */
#play{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .5s;
}
#play.on{opacity:1;pointer-events:auto}

/* TOP BAR */
#top{
  height:var(--topH);
  padding:0 18px;padding-top:var(--safe-t);
  display:flex;align-items:center;gap:14px;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:20;position:relative;
}
.tbrand{font-size:15px;font-weight:700;letter-spacing:-.2px;color:rgba(255,255,255,.9);flex-shrink:0}
.tclk{
  position:absolute;left:50%;top:0;bottom:0;
  transform:translateX(-50%);
  display:flex;align-items:center;
  padding-top:var(--safe-t);
  font-family:var(--fd);font-size:18px;font-weight:300;
  letter-spacing:1px;color:rgba(255,255,255,.82);
  pointer-events:none;white-space:nowrap;
}
.tact{
  position:absolute;right:18px;top:0;bottom:0;
  padding-top:var(--safe-t);
  display:flex;align-items:center;gap:6px;
}
.tbt{
  background:rgba(255,255,255,.07);border:1px solid var(--border);
  color:rgba(255,255,255,.55);cursor:pointer;
  border-radius:50px;padding:0 14px;height:30px;
  display:flex;align-items:center;
  font-family:var(--fm);font-size:11px;
  transition:background .18s,opacity .4s;flex-shrink:0;
}
.tbt:active{background:rgba(255,255,255,.14)}

/* MAIN 3-PANEL */
#main{
  flex:1;min-height:0;
  display:grid;
  grid-template-columns:var(--sideW) 1fr var(--rightW);
}

/* ── LEFT SIDEBAR ── */
#side{
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sideh{
  padding:16px 18px 12px;
  font-size:9px;font-weight:700;letter-spacing:1.8px;color:var(--dim2);
  text-transform:uppercase;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
#tracks{
  flex:1;overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;
}
#tracks::-webkit-scrollbar{width:3px}
#tracks::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.ti{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;cursor:default;
  transition:background .15s;
  border-bottom:1px solid rgba(255,255,255,.025);
  position:relative;
}
.ti:hover{background:rgba(255,255,255,.04)}
.ti.active{background:rgba(255,255,255,.06)}
.ti.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:#c0392b;border-radius:0 2px 2px 0}
.tinum{font-family:var(--fd);font-size:10px;color:var(--dim2);min-width:18px;text-align:right;flex-shrink:0}
.ti.active .tinum{display:none}
.tibars{display:none;align-items:flex-end;gap:1.5px;height:13px;min-width:18px;flex-shrink:0}
.ti.active .tibars{display:flex}
.tib{width:2.5px;background:#c0392b;border-radius:1px;animation:tiba .55s ease-in-out infinite alternate}
.tib:nth-child(1){height:5px;animation-delay:0s}
.tib:nth-child(2){height:9px;animation-delay:.18s}
.tib:nth-child(3){height:6px;animation-delay:.36s}
#app:not(.playing) .tib{animation-play-state:paused}
@keyframes tiba{from{transform:scaleY(.3)}to{transform:scaleY(1)}}
.tiart{width:34px;height:34px;border-radius:5px;overflow:hidden;flex-shrink:0;background:#1a1a1a}
.tiart img{width:100%;height:100%;object-fit:cover;display:block}
.tiinfo{flex:1;min-width:0}
.titl{font-size:11.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tiar{font-size:10px;font-family:var(--fm);color:var(--dim);margin-top:1.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tidur{font-size:9.5px;font-family:var(--fd);color:var(--dim2);flex-shrink:0;margin-left:2px}

/* ── CENTER VINYL ── */
#vcenter{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;gap:18px;
}
#vwrap{position:relative;width:var(--vsize);height:var(--vsize);flex-shrink:0}

#vrec{
  width:100%;height:100%;border-radius:50%;
  position:relative;
  animation:vspin 3.6s linear infinite;
  animation-play-state:paused;
  will-change:transform;
  filter:drop-shadow(0 28px 70px rgba(0,0,0,.95));
}
#app.playing #vrec{animation-play-state:running}
.vdisc{
  position:absolute;inset:0;border-radius:50%;
  background:repeating-radial-gradient(circle at 50% 50%,#101010 0px,#090909 1px,#151515 2px,#090909 3px,#111 5px);
}
.vdisc::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(
    rgba(255,255,255,.03) 0deg,transparent 50deg,
    rgba(255,255,255,.02) 110deg,transparent 160deg,
    rgba(255,255,255,.025) 220deg,transparent 270deg,
    rgba(255,255,255,.03) 320deg,transparent 360deg
  );
}
.vlabel{
  position:absolute;width:33%;height:33%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  border-radius:50%;overflow:hidden;background:#1e1e1e;z-index:2;
}
.vlabel img{width:100%;height:100%;object-fit:cover;display:block}
.vpin{
  position:absolute;width:9px;height:9px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  border-radius:50%;background:radial-gradient(circle,#ccc,#555);z-index:3;
}
.tawrap{position:absolute;top:2%;right:2%;width:50%;height:56%;pointer-events:none;z-index:4}
.tapivot{
  position:absolute;top:6%;right:6%;width:14px;height:14px;
  border-radius:50%;background:radial-gradient(circle,#999,#444);
  box-shadow:0 2px 8px rgba(0,0,0,.6);
}
.taarm{
  position:absolute;top:calc(6% + 7px);right:calc(6% + 7px);
  width:2.5px;height:78%;
  background:linear-gradient(to bottom,#888,#555);
  border-radius:2px;transform-origin:top center;transform:rotate(-30deg);
}
.taarm::after{
  content:'';position:absolute;bottom:-2px;left:50%;
  transform:translateX(-50%) rotate(14deg);
  width:10px;height:2.5px;background:#666;border-radius:2px;
}
.tahead{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:#aaa}

/* Vinyl info shown below vinyl (portrait / vertical screens) */
#vinfo{display:none;flex-direction:column;align-items:center;text-align:center;gap:4px;padding:0 20px}
.vi-title{font-size:18px;font-weight:700;letter-spacing:-.2px}
.vi-artist{font-size:13px;font-family:var(--fm);color:var(--dim)}

@keyframes vspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── RIGHT PANEL ── */
#rpanel{
  background:rgba(0,0,0,.48);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.rart{flex-shrink:0;aspect-ratio:1/1;width:100%;overflow:hidden;position:relative}
.rart img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .5s}
.rart::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 55%,rgba(0,0,0,.88) 100%)}
.rinfo{flex:1;padding:16px 18px;display:flex;flex-direction:column;gap:5px;border-top:1px solid var(--border)}
.rlabel{font-size:9px;font-weight:700;letter-spacing:1.6px;color:var(--dim2);text-transform:uppercase;margin-bottom:2px}
.rtitle{font-size:15px;font-weight:700;line-height:1.3}
.rartist{font-size:12px;font-family:var(--fm);color:var(--dim);margin-top:1px}
.ralbum{font-size:10.5px;font-family:var(--fm);color:var(--dim2);margin-top:3px}

/* ── BOTTOM BAR ── */
#bot{
  height:var(--botH);padding-bottom:var(--safe-b);
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;z-index:20;position:relative;
}
.bleft{display:flex;align-items:center;gap:10px;width:var(--sideW);flex-shrink:0;min-width:0}
.bart{width:42px;height:42px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#1a1a1a}
.bart img{width:100%;height:100%;object-fit:cover;display:block}
.binfo{flex:1;min-width:0}
.btitle{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bartist{font-size:10px;font-family:var(--fm);color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.bcenter{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
}
.bbtns{display:flex;align-items:center;gap:8px}
.cbtn{
  background:none;border:none;color:#fff;cursor:pointer;
  border-radius:50%;padding:10px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,opacity .15s;
}
.cbtn:active{transform:scale(.85);opacity:.6}
.cbtn.sm svg{width:24px;height:24px}
.cbtn.lg svg{width:30px;height:30px}

/* progress shown as time only */

.bright{width:var(--rightW);flex-shrink:0;display:flex;justify-content:flex-end;align-items:center}
.btime{font-family:var(--fd);font-size:10.5px;color:rgba(255,255,255,.22);letter-spacing:.3px}

/* ══════════════════════════════════════════
   VERTICAL / PORTRAIT LAYOUT
══════════════════════════════════════════ */
@media (orientation:portrait),(max-aspect-ratio:2/3){
  /* Top bar: transparent, hide brand & clock, keep disconnect */
  #top{background:rgba(0,0,0,.15);border-bottom-color:transparent;backdrop-filter:none}
  .tbrand,.tclk{display:none}

  /* Hide side panels */
  #side,#rpanel{display:none}

  /* Main: single col, full height, acts as canvas */
  #main{grid-template-columns:1fr;overflow:visible}

  /* vcenter: fills main, overflow allowed for large vinyl */
  #vcenter{overflow:visible;padding:0;gap:0}

  /* Vinyl: bigger, half off-screen right, centered vertically */
  #vwrap{
    position:absolute;
    right:-50vw;
    top:50%;
    transform:translateY(-50%);
    width:min(110vw,680px);
    height:min(110vw,680px);
  }

  /* Track info: top-left overlay */
  #vinfo{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    text-align:left;
    position:absolute;
    top:8%;
    left:6%;
    z-index:15;
    max-width:56%;
    pointer-events:none;
    gap:6px;
  }
  /* Song title: big bold primary */
  .vi-title{
    font-size:clamp(26px,8vw,46px);
    font-weight:700;
    line-height:1.1;
    color:#fff;
    font-style:normal;
    font-family:var(--fn);
    order:-1;
  }
  /* Artist name: small italic secondary */
  .vi-artist{
    font-size:clamp(13px,3.8vw,20px);
    font-family:var(--fm);
    font-style:italic;
    font-weight:300;
    color:var(--dim);
    order:0;
  }

  /* Bottom bar: vertical controls aligned to disk center */
  #bot{
    position:absolute;
    left:6%;
    top:50%;
    transform:translateY(-50%);
    height:auto;width:auto;
    background:none;
    border:none;
    border-top:none;
    backdrop-filter:none;-webkit-backdrop-filter:none;
    padding:10px 6px;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0;
    z-index:15;
    flex-shrink:0;
  }

  /* Controls: static inside the pill */
  .bcenter{
    position:static !important;
    transform:none !important;
    left:auto !important;
    top:auto !important;
    gap:0;
  }
  .bbtns{flex-direction:column;gap:6px}

  /* Time below the buttons inside pill */
  .btime{
    font-size:10px;
    color:rgba(255,255,255,.3);
    text-align:center;
    margin-top:10px;
    letter-spacing:.3px;
  }
}

/* Bigger album label in portrait */
@media (orientation:portrait),(max-aspect-ratio:2/3){
  .vlabel{width:44%;height:44%}
}

/* Extra-tall portrait (big vertical TV / monitor) */
@media (orientation:portrait) and (min-height:1000px){
  #vwrap{right:-14%;width:min(85vw,660px);height:min(85vw,660px)}
  .vi-artist{font-size:clamp(32px,7vw,60px)}
  .vi-title{font-size:clamp(16px,3.5vw,26px)}
  .ct.big .ds,.ct.big .sep{font-size:min(16vw,130px)}
}

/* Landscape small height (horizontal phone/tablet) */
@media (orientation:landscape) and (max-height:500px){
  :root{--vsize:min(42vh,240px);--topH:44px;--botH:62px}
}

/* Wide desktop — hide panels if not enough room */
@media (max-width:860px) and (orientation:landscape){
  :root{--sideW:0px;--rightW:0px;--vsize:min(56vh,360px)}
  #side,#rpanel{display:none}
  #vinfo{display:flex}
  .bleft{width:auto}
  .bright{width:auto}
}

/* ── DEVICE PICKER ── */
#devPanel{
  position:fixed;top:calc(var(--topH) + var(--safe-t) + 6px);right:18px;
  z-index:160;background:rgba(16,16,16,.97);
  border:1px solid var(--border);border-radius:14px;overflow:hidden;
  min-width:230px;
  opacity:0;pointer-events:none;
  transition:opacity .18s,transform .18s;
  transform:translateY(-6px);
}
#devPanel.on{opacity:1;pointer-events:auto;transform:translateY(0)}
.dev-head{
  padding:10px 14px 8px;
  font-size:9px;font-weight:700;letter-spacing:1.6px;color:var(--dim2);
  text-transform:uppercase;border-bottom:1px solid var(--border);
}
.dev-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;cursor:pointer;
  transition:background .15s;
  border-bottom:1px solid rgba(255,255,255,.03);
}
.dev-item:last-child{border-bottom:none}
.dev-item:hover{background:rgba(255,255,255,.05)}
.dev-item.active{background:rgba(29,185,84,.07)}
.dev-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dev-type{font-size:10px;font-family:var(--fm);color:var(--dim);margin-top:1px}
.dev-dot{width:7px;height:7px;border-radius:50%;background:#1DB954;flex-shrink:0;opacity:0}
.dev-item.active .dev-dot{opacity:1}
.dev-msg{padding:13px 14px;font-size:11px;color:var(--dim2);font-family:var(--fm)}

/* ── SEARCH PANEL ── */
#srPanel{
  position:fixed;inset:0;z-index:150;
  display:flex;align-items:flex-start;justify-content:center;
  padding:calc(var(--safe-t) + 58px) 16px 0;
  background:rgba(0,0,0,.58);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  opacity:0;pointer-events:none;
  transition:opacity .22s;
}
#srPanel.on{opacity:1;pointer-events:auto}
#srBox{
  width:100%;max-width:480px;
  background:rgba(16,16,16,.96);
  border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
  display:flex;flex-direction:column;
  max-height:68vh;
}
#srHead{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#srInput{
  flex:1;background:none;border:none;outline:none;
  color:#fff;font-family:var(--fn);font-size:14px;
  padding:4px 0;
}
#srInput::placeholder{color:var(--dim2)}

  padding:4px;display:flex;align-items:center;
  transition:color .15s;flex-shrink:0;
}

  flex:1;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;
}
#srList::-webkit-scrollbar{width:3px}
#srList::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.sr-empty{
  padding:32px 16px;text-align:center;
  font-family:var(--fm);font-size:12px;color:var(--dim2);
}
.sr{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;
  border-bottom:1px solid rgba(255,255,255,.03);

.sr:last-child{border-bottom:none}
.sr:hover{background:rgba(255,255,255,.04)}
.sr-art{
  width:40px;height:40px;border-radius:6px;
  overflow:hidden;flex-shrink:0;background:#1a1a1a;
}
.sr-art img{width:100%;height:100%;object-fit:cover;display:block}
.sr-info{flex:1;min-width:0}
.sr-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  background:rgba(29,185,84,.14);border:1px solid rgba(29,185,84,.28);

  border-radius:50px;padding:0 13px;height:27px;
  display:flex;align-items:center;
  font-family:var(--fm);font-size:10.5px;font-weight:600;
  transition:background .18s,opacity .2s;flex-shrink:0;white-space:nowrap;
}

.sr-btn:disabled{opacity:.38;cursor:default;pointer-events:none}
.sr-btns{display:flex;gap:6px;flex-shrink:0}
.sr-spin{
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,.12);border-top-color:rgba(255,255,255,.55);
  border-radius:50%;animation:spin .65s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
/* Toast */
#toast{
  position:fixed;
  bottom:calc(var(--botH) + var(--safe-b) + 14px);
  left:50%;transform:translateX(-50%) translateY(10px);
  background:rgba(28,28,28,.96);border:1px solid var(--border);
  border-radius:50px;padding:9px 20px;
  font-family:var(--fm);font-size:12px;color:#fff;
  opacity:0;pointer-events:none;z-index:500;
  transition:opacity .2s,transform .2s;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media (orientation:portrait),(max-aspect-ratio:2/3){
  #toast{bottom:calc(100px + var(--safe-b))}
}
/* ── QUEUE ANIMATIONS ── */
@keyframes tiSlideLeft{
  from{transform:translateX(0);opacity:1}
  to  {transform:translateX(-120%);opacity:0}
}
@keyframes tiPushUp{
  from{transform:translateY(0);opacity:1}
  to  {transform:translateY(-18px);opacity:0}
}

/* ── HAMBURGER MENU ── */
#hMenu{
  position:fixed;top:calc(var(--topH) + var(--safe-t) + 6px);right:18px;
  z-index:165;background:rgba(16,16,16,.97);

  min-width:190px;
  opacity:0;pointer-events:none;
  transition:opacity .18s,transform .18s;

.hm-item{
  display:flex;align-items:center;justify-content:space-between;

  border-bottom:1px solid rgba(255,255,255,.04);

</style>
</head>
<body>
<div id="app">

  <!-- Background -->
  <div class="bg">
    <div class="bgl a" id="bgA"></div>
    <div class="bgl b" id="bgB"></div>

  <!-- Auth -->
  <div id="auth">
    <div class="av"></div>
    <div class="at">Timessss</div>
    <div class="as">Connect Spotify to bring your music to life</div>
    <button id="authBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381C8.64 5.801 15.6 6.06 20.04 8.82c.541.3.719 1.02.42 1.56-.299.421-1.02.599-1.379.3z"/></svg>
      Connect Spotify
    </button>
  </div>

  <!-- Idle: big clock -->
  <div id="idle">
    <div class="ct big" id="ct">
      <div class="ds" id="h0"><span class="cur">0</span></div>
      <div class="ds" id="h1"><span class="cur">0</span></div>
      <div class="sep">:</div>
      <div class="ds" id="m0"><span class="cur">0</span></div>
      <div class="ds" id="m1"><span class="cur">0</span></div>
      <div class="sep">:</div>
      <div class="ds" id="s0"><span class="cur">0</span></div>
      <div class="ds" id="s1"><span class="cur">0</span></div>

  <!-- Playing layout -->
  <div id="play">

    <div id="top">

      <div class="tclk" id="tclk">--:--:--</div>
      <div class="tact">
        <button class="tbt" id="srBtn">Search</button>
        <button class="tbt" id="devBtn">Devices</button>
        <button class="tbt" id="menuBtn">&#9776;</button>
      </div>

    <div id="main">

      <!-- Left -->
      <div id="side">

      <!-- Center: vinyl + info (portrait) -->
      <div id="vcenter">
        <div id="vwrap">
          <div id="vrec">

        <!-- Only visible in portrait/vertical -->
        <div id="vinfo">
          <div class="vi-title" id="vi-title">--</div>
          <div class="vi-artist" id="vi-artist">--</div>
        </div>

      <!-- Right -->
      <div id="rpanel">
        <div class="rart"><img id="rimg" src="" alt=""></div>
        <div class="rinfo">
          <div class="rlabel">Now Playing</div>
          <div class="rtitle" id="rtitle">--</div>
          <div class="rartist" id="rartist">--</div>
          <div class="ralbum" id="ralbum"></div>
        </div>
      </div>

    </div>

    <!-- Bottom bar -->
    <div id="bot">
      <div class="bcenter">
        <div class="bbtns">
          <button class="cbtn sm" id="bPrev"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
          <button class="cbtn lg" id="bPlay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
          <button class="cbtn sm" id="bNext"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>
        <div class="btime" id="btime">0:00 / 0:00</div>
      </div>

  </div>
  <!-- Hamburger Menu -->
  <div id="hMenu">
    <div class="hm-item" id="hClockItem">
      <span class="hm-label">Clock</span>
      <span class="hm-badge on" id="hClockBadge">ON</span>
    </div>
    <div class="hm-sep"></div>
    <div class="hm-item" id="hDiscItem">
      <span class="hm-label" style="color:rgba(255,100,100,.75)">Disconnect</span>
    </div>
  </div>

  <!-- Device Picker -->
  <div id="devPanel">
    <div class="dev-head">Play On</div>
    <div id="devList"></div>
  </div>

  <!-- Search Panel -->
  <div id="srPanel">
    <div id="srBox">
      <div id="srHead">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width:15px;height:15px;flex-shrink:0;opacity:.35"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input id="srInput" type="text" placeholder="Search songs…" autocomplete="off" spellcheck="false">
        <button id="srClose">
          <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div id="srList"><div class="sr-empty">Search for a song to add to queue</div></div>
    </div>
  </div>
  <!-- Toast -->
  <div id="toast"></div>

</div>

<script>
/* ═══ CONFIG — redirect auto-detects current origin ═══ */
const REDIRECT = location.href.split('?')[0].replace(/index\.html$/, '');
const C = {
  id: '2dba0d8b0d3540c79971f906ab1e3589',
  redirect: REDIRECT,
  scope: 'user-read-playback-state user-modify-playback-state user-read-recently-played user-read-currently-playing',
  TK:'ts_tk', RT:'ts_rt', EX:'ts_ex', CV:'ts_cv',
};

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML };
const sleep = ms => new Promise(r => setTimeout(r, ms));
const fmt = ms => { const s = Math.floor(ms/1000), m = Math.floor(s/60); return `${m}:${(s%60).toString().padStart(2,'0')}` };

/* ═══ AUTH ═══ */
function rnd(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return Array.from(a,b=>b.toString(16).padStart(2,'0')).join('')}
async function sha(s){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s))}
function b64u(b){return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
async function doAuth(){
  const v=rnd(64); localStorage.setItem(C.CV,v);
  location.href='https://accounts.spotify.com/authorize?'+new URLSearchParams({
    client_id:C.id, response_type:'code', redirect_uri:C.redirect,
    scope:C.scope, code_challenge_method:'S256', code_challenge:b64u(await sha(v))
  });
}
async function swap(code){
  const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({client_id:C.id,grant_type:'authorization_code',
      code, redirect_uri:C.redirect, code_verifier:localStorage.getItem(C.CV)})});
  const d=await r.json(); if(d.access_token){save(d);return true} return false;
}
async function doRefresh(){
  const rt=localStorage.getItem(C.RT); if(!rt)return false;
  try{
    const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({client_id:C.id,grant_type:'refresh_token',refresh_token:rt})});
    const d=await r.json(); if(d.access_token){save(d);return true}
  }catch(e){}
  return false;
}
function save(d){
  localStorage.setItem(C.TK,d.access_token);
  if(d.refresh_token)localStorage.setItem(C.RT,d.refresh_token);
  localStorage.setItem(C.EX,Date.now()+d.expires_in*1000);
}
const token=()=>localStorage.getItem(C.TK);
const expired=()=>Date.now()>+(localStorage.getItem(C.EX)||0);
function clearAuth(){[C.TK,C.RT,C.EX,C.CV].forEach(k=>localStorage.removeItem(k))}
async function api(path){
  if(expired()&&!await doRefresh()){goAuth();return null}
  try{
    const r=await fetch('https://api.spotify.com/v1'+path,{headers:{Authorization:'Bearer '+token()}});
    if(r.status===401){if(!await doRefresh()){goAuth();return null}return api(path)}
    if(r.status===204||r.status===202)return null;
    return r.json();
  }catch(e){return null}
}
async function cmd(method,path){
  if(expired())await doRefresh();
  return fetch('https://api.spotify.com/v1'+path,{method,headers:{Authorization:'Bearer '+token()}});
}
async function cmdJSON(method,path,body){
  if(expired())await doRefresh();
  return fetch('https://api.spotify.com/v1'+path,{method,
    headers:{Authorization:'Bearer '+token(),'Content-Type':'application/json'},
    body:body?JSON.stringify(body):undefined});
}

/* ═══ STATE ═══ */
let S={playing:false,tid:null,uri:'',prog:0,dur:0,title:'',artist:'',album:'',art:'',bgSide:'a',pollT:0,pollP:0};

/* ═══ CLOCK ═══ */
const SLOTS=['h0','h1','m0','m1','s0','s1'];
function setDigit(id,val){
  const el=$('#'+id);
  // Remove any stale out/nxt spans left over from backgrounded tab
  el.querySelectorAll('.out,.nxt').forEach(s=>s.remove());
  const cur=el.querySelector('.cur');
  if(cur&&cur.textContent===val)return;
  const n=document.createElement('span');
  n.textContent=val; n.className='nxt';
  el.appendChild(n);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    if(cur)cur.className='out';
    n.className='cur';
  }));
  if(cur)setTimeout(()=>{if(cur.parentNode)cur.remove()},500);
}

// When tab regains focus, force-clean all digit slots instantly
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){
    SLOTS.forEach(id=>{
      const el=$('#'+id);
      const all=[...el.querySelectorAll('span')];
      if(all.length>1){
        all.slice(0,-1).forEach(s=>s.remove());
        all[all.length-1].className='cur';
      }
    });
    tick();
  }
});
function tick(){
  const now=new Date();
  const h=now.getHours().toString().padStart(2,'0');
  const m=now.getMinutes().toString().padStart(2,'0');
  const s=now.getSeconds().toString().padStart(2,'0');
  [h[0],h[1],m[0],m[1],s[0],s[1]].forEach((v,i)=>setDigit(SLOTS[i],v));
  $('#cd').textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  $('#tclk').textContent=`${h}:${m}:${s}`;
}
setInterval(tick,1000); tick();

/* ═══ BG ═══ */
function setBg(url){
  if(!url)return;
  const nx=S.bgSide==='a'?'b':'a';
  const nE=$('#bg'+nx.toUpperCase()), cE=$('#bg'+S.bgSide.toUpperCase());
  nE.style.backgroundImage=`url(${url})`;
  requestAnimationFrame(()=>{nE.style.opacity='1';cE.style.opacity='0'});
  S.bgSide=nx;
}

/* ═══ PROGRESS TIME ═══ */
function updateWaveform(){
  $('#btime').textContent=`${fmt(S.prog)} / ${fmt(S.dur)}`;
}

/* ═══ QUEUE REFRESH ═══ */
async function refreshQueue(){
  if(!S.tid)return;
  const q=await api('/me/player/queue');
  const cur={name:S.title,artist:S.artist,art:S.art,dur:S.dur,uri:S.uri,cur:true};
  const seen=new Set([S.art]);
  const upcoming=(q?.queue||[]).filter(t=>{
    const art=t.album?.images?.[1]?.url||t.album?.images?.[0]?.url||'';
    if(!art||seen.has(art))return false;seen.add(art);return true;
  }).slice(0,9).map(t=>({
    name:t.name,artist:(t.artists||[]).map(a=>a.name).join(', '),
    art:t.album?.images?.[1]?.url||t.album?.images?.[0]?.url||'',
    dur:t.duration_ms||0,uri:t.uri||'',cur:false
  }));
  renderTracks([cur,...upcoming]);
}

/* ═══ TRACK LIST ═══ */
function renderTracks(list){
  const el=$('#tracks'); el.innerHTML='';
  list.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='ti'+(t.cur?' active':'');
    d.innerHTML=`
      <div class="tibars"><div class="tib"></div><div class="tib"></div><div class="tib"></div></div>
      <div class="tinum">${String(i+1).padStart(2,'0')}</div>
      <div class="tiart"><img src="${t.art||''}" loading="lazy" alt=""></div>
      <div class="tiinfo">
        <div class="titl">${esc(t.name)}</div>
        <div class="tiar">${esc(t.artist)}</div>
      </div>
      ${t.dur?`<div class="tidur">${fmt(t.dur)}</div>`:''}
    `;
    el.appendChild(d);
    if(t.cur)requestAnimationFrame(()=>d.scrollIntoView({block:'center',behavior:'smooth'}));
  });
}

/* ═══ QUEUE ANIMATION ═══ */
async function animateQueueExit(){
  const items=[...$('#tracks').children];
  if(!items.length)return;
  const active=items.find(i=>i.classList.contains('active'));
  const others=items.filter(i=>i!==active);
  const h=active?active.offsetHeight:52;
  // Active song: slide left
  if(active){
    active.style.transition='transform 0.44s cubic-bezier(0.55,0,1,0.45),opacity 0.34s ease';
    requestAnimationFrame(()=>{active.style.transform='translateX(-120%)';active.style.opacity='0'});
  }
  // Remaining songs: push up (no fade), staggered
  await sleep(80);
  others.forEach((item,i)=>{
    item.style.transition=`transform 0.42s cubic-bezier(0.4,0,0.2,1) ${i*28}ms`;
    requestAnimationFrame(()=>{item.style.transform=`translateY(-${h}px)`});
  });
  await sleep(460);
}


/* ═══ RENDER ═══ */
function render(){
  const a=S.art||'';
  $('#vart').src=a;
  $('#rimg').src=a;
  $('#rtitle').textContent=S.title||'--';
  $('#rartist').textContent=S.artist||'--';
  $('#ralbum').textContent=S.album||'';
  $('#vi-title').textContent=S.title||'--';
  $('#vi-artist').textContent=S.artist||'--';
  playIcon();
}
function playIcon(){
  $('#bPlay').innerHTML=S.playing
    ?'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>'
    :'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  $('#app').classList.toggle('playing',S.playing);
}

/* ═══ PROGRESS ═══ */
let pRAF=null;
function startProg(){
  const f=()=>{
    if(S.playing){S.prog=Math.min(S.pollP+(Date.now()-S.pollT),S.dur)}
    updateWaveform(); pRAF=requestAnimationFrame(f);
  };
  if(!pRAF)f();
}
function stopProg(){if(pRAF){cancelAnimationFrame(pRAF);pRAF=null}}

/* ═══ TRANSITION ═══ */
async function transition(d){
  const vl=$('#veil');
  // ① Queue exit — fully visible to user (slide left + push up)
  await animateQueueExit();
  // ② Veil closes
  vl.classList.add('on'); await sleep(340);
  // ③ Update state (hidden behind veil)
  S.tid=d.id; S.uri=d.uri||''; S.title=d.title; S.artist=d.artist; S.album=d.album;
  S.art=d.art; S.prog=d.prog; S.dur=d.dur; S.playing=d.playing;
  S.pollT=Date.now(); S.pollP=d.prog;
  setBg(S.art);
  // ④ Hide tracks before DOM swap — prevents single-frame flash of old items
  $('#tracks').style.visibility='hidden';
  await refreshQueue();
  render();
  $('#tracks').style.visibility='';
  // ⑤ Veil lifts — new queue already in place
  await sleep(160); vl.classList.remove('on');
}

/* ═══ POLL ═══ */
let pollId=null;
async function poll(){
  const d=await api('/me/player/currently-playing');
  if(d?.item){
    const isNew=d.item.id!==S.tid;
    S.playing=d.is_playing; S.pollT=Date.now(); S.pollP=d.progress_ms||0;
    if(isNew){
      await transition({
        id:d.item.id, uri:d.item.uri||'', title:d.item.name,
        artist:(d.item.artists||[]).map(a=>a.name).join(', '),
        album:d.item.album?.name||'',
        art:d.item.album?.images?.[0]?.url||'',
        prog:d.progress_ms||0, dur:d.item.duration_ms||0, playing:d.is_playing
      });
      goPlay();
    } else {
      S.prog=d.progress_ms||0; S.dur=d.item.duration_ms||0;
      playIcon();
    }
    startProg();
  } else {
    S.playing=false; S.tid=null;
    $('#app').classList.remove('playing');
    goIdle(); stopProg();
  }
}

/* ═══ MODES ═══ */
function goPlay(){$('#idle').classList.add('off');$('#play').classList.add('on')}
function goIdle(){
  $('#idle').classList.remove('off');$('#play').classList.remove('on');
  $('#bgA').style.opacity='0';$('#bgB').style.opacity='0';
}

/* ═══ CONTROLS ═══ */
$('#bPlay').onclick=async()=>{
  if(S.playing){await cmd('PUT','/me/player/pause');S.playing=false}
  else{await cmd('PUT','/me/player/play');S.playing=true}
  S.pollT=Date.now();S.pollP=S.prog;playIcon();
};
$('#bNext').onclick=async()=>{await cmd('POST','/me/player/next');setTimeout(poll,500);setTimeout(refreshQueue,1200)};
$('#bPrev').onclick=async()=>{await cmd('POST','/me/player/previous');setTimeout(poll,500);setTimeout(refreshQueue,1200)};
/* ═══ HAMBURGER MENU ═══ */
let hMenuOpen=false,clockOn=true;
$('#menuBtn').onclick=e=>{e.stopPropagation();hMenuOpen?closeHMenu():openHMenu()};
function openHMenu(){hMenuOpen=true;$('#hMenu').classList.add('on')}
function closeHMenu(){hMenuOpen=false;$('#hMenu').classList.remove('on')}
$('#hMenu').addEventListener('click',e=>e.stopPropagation());
document.addEventListener('click',()=>{if(hMenuOpen)closeHMenu()});
$('#hDiscItem').onclick=()=>{closeHMenu();clearAuth();goAuth()};
$('#hClockItem').onclick=()=>{
  clockOn=!clockOn;
  $('#tclk').style.display=clockOn?'':'none';
  $('#hClockBadge').textContent=clockOn?'ON':'OFF';
  $('#hClockBadge').className='hm-badge '+(clockOn?'on':'off');
};

/* Auto-hide top buttons after 3s, show on any interaction */
let discTimer=null;
function showDisc(){
  $('#menuBtn').style.opacity='1';$('#menuBtn').style.pointerEvents='auto';
  clearTimeout(discTimer);
  discTimer=setTimeout(()=>{
    $('#menuBtn').style.opacity='0';$('#menuBtn').style.pointerEvents='none';
  },3000);
}
['mousemove','touchstart','click','keydown'].forEach(ev=>document.addEventListener(ev,showDisc,{passive:true}));
showDisc();

/* ═══ AUTH FLOW ═══ */
function goAuth(){if(pollId)clearInterval(pollId);stopProg();$('#auth').classList.remove('out');goIdle()}
function goMain(){$('#auth').classList.add('out');poll();pollId=setInterval(poll,3500)}
$('#authBtn').onclick=doAuth;

/* ═══ INIT ═══ */
(async()=>{
  const p=new URLSearchParams(location.search), code=p.get('code');
  if(code){history.replaceState(null,'',location.pathname);if(await swap(code)){goMain();return}}
  const t=token();
  if(t&&!expired()){goMain();return}
  if(t&&expired()&&await doRefresh()){goMain();return}
  goAuth();
})();

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

/* ═══ DEVICE PICKER ═══ */
let devOpen=false;
function openDevices(){
  devOpen=true;$('#devPanel').classList.add('on');loadDevices();
}
function closeDevices(){
  devOpen=false;$('#devPanel').classList.remove('on');
}
$('#devBtn').onclick=e=>{e.stopPropagation();devOpen?closeDevices():openDevices()};
document.addEventListener('click',()=>{if(devOpen)closeDevices()});
$('#devPanel').addEventListener('click',e=>e.stopPropagation());

async function loadDevices(){
  $('#devList').innerHTML='<div class="dev-msg">Loading…</div>';
  const d=await api('/me/player/devices');
  const list=d?.devices||[];
  if(!list.length){$('#devList').innerHTML='<div class="dev-msg">No devices found — open Spotify on a device</div>';return}
  $('#devList').innerHTML='';
  list.forEach(dev=>{$('#devList').appendChild(makeDeviceEl(dev))});
}

function makeDeviceEl(dev){
  const div=document.createElement('div');
  div.className='dev-item'+(dev.is_active?' active':'');
  div.innerHTML=`<div style="flex:1;min-width:0">
    <div class="dev-name">${esc(dev.name)}</div>
    <div class="dev-type">${esc(dev.type||'Device')}</div>
  </div><div class="dev-dot"></div>`;
  div.onclick=()=>selectDevice(dev.id);
  return div;
}

async function selectDevice(deviceId){
  closeDevices();
  await cmdJSON('PUT','/me/player',{device_ids:[deviceId],play:S.playing});
  showToast('Switched device');
  setTimeout(poll,800);
}


/* ═══ SEARCH + QUEUE ═══ */
function showToast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2400);
}

function openSearch(){
  $('#srPanel').classList.add('on');
  setTimeout(()=>$('#srInput').focus(),120);
}
function closeSearch(){
  $('#srPanel').classList.remove('on');
  $('#srInput').value='';
  $('#srList').innerHTML='<div class="sr-empty">Search for a song to add to queue</div>';
}

$('#srBtn').onclick=openSearch;
$('#srClose').onclick=closeSearch;
$('#srPanel').addEventListener('click',e=>{if(e.target===$('#srPanel'))closeSearch()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&$('#srPanel').classList.contains('on'))closeSearch()});

let srDebounce=null;
$('#srInput').addEventListener('input',()=>{
  clearTimeout(srDebounce);
  const q=$('#srInput').value.trim();
  if(!q){$('#srList').innerHTML='<div class="sr-empty">Search for a song to add to queue</div>';return}
  $('#srList').innerHTML='<div class="sr-empty"><div class="sr-spin"></div></div>';
  srDebounce=setTimeout(()=>doSearch(q),300);
});

async function doSearch(q){
  const d=await api(`/search?type=track&limit=10&q=${encodeURIComponent(q)}`);
  if(!d?.tracks?.items?.length){$('#srList').innerHTML='<div class="sr-empty">No results found</div>';return}
  $('#srList').innerHTML='';
  d.tracks.items.forEach(t=>{
    const art=t.album?.images?.[1]?.url||t.album?.images?.[0]?.url||'';
    const artists=(t.artists||[]).map(a=>a.name).join(', ');
    const div=document.createElement('div');
    div.className='sr';
    div.innerHTML=`
      <div class="sr-art"><img src="${esc(art)}" loading="lazy" alt=""></div>
      <div class="sr-info">
        <div class="sr-title">${esc(t.name)}</div>
        <div class="sr-artist">${esc(artists)}</div>
      </div>
      <div class="sr-btns">
        <button class="sr-btn sr-pn">Play Next</button>
        <button class="sr-btn sr-aq" style="background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.18);color:#fff">Add to Queue</button>
      </div>
    `;
    div.querySelector('.sr-pn').onclick=()=>addToQueue(t.uri,div.querySelector('.sr-pn'));
    div.querySelector('.sr-aq').onclick=()=>addToQueue(t.uri,div.querySelector('.sr-aq'));
    $('#srList').appendChild(div);
  });
}

async function addToQueue(uri,btn){
  if(btn.disabled)return;
  btn.disabled=true;
  // Check for active device first
  const devs=await api('/me/player/devices');
  if(!devs){showToast('Could not reach Spotify');btn.disabled=false;return}
  const active=(devs.devices||[]).find(d=>d.is_active);
  if(!active){showToast('Open Spotify on a device first');btn.disabled=false;return}
  try{
    let r=await cmd('POST',`/me/player/queue?uri=${encodeURIComponent(uri)}`);
    if(r.status===401){await doRefresh();r=await cmd('POST',`/me/player/queue?uri=${encodeURIComponent(uri)}`)}
    if(r.ok||r.status===204||r.status===200){
      showToast('Added to queue');
      setTimeout(()=>{btn.disabled=false;refreshQueue()},1600);
    } else if(r.status===403){
      showToast('Spotify Premium required');btn.disabled=false;
    } else if(r.status===404){
      showToast('No active device found');btn.disabled=false;
    } else {
      showToast('Failed to add — try again');btn.disabled=false;
    }
  }catch(e){showToast('Network error');btn.disabled=false}
}
</script>
